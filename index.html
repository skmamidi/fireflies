          overflow: hidden;

    const readStoredValue = (key, fallback, validate = () => true) => {
      const storageKey = notebookStorageKey(key);
      for (const storageName of ['localStorage', 'sessionStorage']) {
        const stored = readStorageSafely(storageName, storageKey);
        if (!stored) continue;
        try {
          const parsed = JSON.parse(stored);
          if (validate(parsed)) return { value: parsed, restored: true };
        } catch {}
      }
      return { value: cloneNotebookValue(fallback), restored: false };
    };

    const writeStoredValue = (key, value) => {
      const storageKey = notebookStorageKey(key);
      try {
        const serialized = JSON.stringify(value);
        writeStorageSafely('localStorage', storageKey, serialized);
        writeStorageSafely('sessionStorage', storageKey, serialized);
      } catch {}
    };

    const removeStoredValue = (key) => {
      const storageKey = notebookStorageKey(key);
      removeStorageSafely('localStorage', storageKey);
      removeStorageSafely('sessionStorage', storageKey);
    };

    const hasStoredNotebookEntry = (key) => {
      const storageKey = notebookStorageKey(key);
      for (const storageName of ['localStorage', 'sessionStorage']) {
        const stored = readStorageSafely(storageName, storageKey);
        if (!stored) continue;
        try {
          JSON.parse(stored);
          return true;
        } catch {}
      }
      return false;
    };

    const hasSavedNotebookForStage = (stageId) => {
      const keys = MISSION_NOTEBOOK_KEYS[stageId] || [];
      return keys.some(hasStoredNotebookEntry);
    };

    const isPlainNotebookObject = (value) => Boolean(value) && typeof value === 'object' && !Array.isArray(value);

    const useMissionState = (key, fallback, options = {}) => {
      const { validate = () => true, onStatus } = options;
      const callbackRef = useRef(onStatus);
      const fallbackRef = useRef(cloneNotebookValue(fallback));
      const initialReadRef = useRef(null);
      const [value, setValue] = useState(() => {
        const result = readStoredValue(key, fallbackRef.current, validate);
        initialReadRef.current = result;
        return result.value;
      });
      const valueSignature = useMemo(() => notebookSignature(value), [value]);

      useEffect(() => {
        callbackRef.current = onStatus;
      }, [onStatus]);

      useEffect(() => {
        const hasMeaningfulValue = valueSignature !== notebookSignature(fallbackRef.current);
        if (hasMeaningfulValue) {
          writeStoredValue(key, value);
        } else {
          removeStoredValue(key);
        }
        callbackRef.current?.(
          hasMeaningfulValue || initialReadRef.current?.restored
            ? { saved: hasMeaningfulValue, restored: Boolean(initialReadRef.current?.restored), key: notebookStorageKey(key) }
            : null
        );
      }, [key, value, valueSignature]);

      const reset = useCallback(() => {
        initialReadRef.current = { value: cloneNotebookValue(fallbackRef.current), restored: false };
        removeStoredValue(key);
        setValue(cloneNotebookValue(fallbackRef.current));
        callbackRef.current?.(null);
      }, [key]);

      return [value, setValue, { reset, restored: Boolean(initialReadRef.current?.restored) }];
    };

    const useSessionArray = (key, fallback = [], options = {}) => {
      return useMissionState(key, fallback, {
        ...options,
        validate: (value) => Array.isArray(value) && (options.validate ? options.validate(value) : true)
      });
    };

    const useNotebookField = (setState) => useCallback((field, nextValue) => {
      setState(prev => ({
        ...prev,
        [field]: typeof nextValue === 'function' ? nextValue(prev[field]) : nextValue
      }));
    }, [setState]);

    const includesSameItems = (value, allowedItems) => Array.isArray(value) && value.every(item => allowedItems.includes(item));

    const validateNotebookObject = (requiredKeys, extraCheck = () => true) => (value) => {
      if (!isPlainNotebookObject(value)) return false;

    const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const SCIENCE_GLOSSARY_PATTERN = new RegExp(`\\b(${SCIENCE_GLOSSARY_ENTRIES.flatMap(entry => entry.terms).sort((a, b) => b.length - a.length).map(escapeRegex).join('|')})\\b`, 'gi');

    const glossaryEntryFor = (term) => SCIENCE_GLOSSARY_LOOKUP[String(term).toLowerCase()];

    function ScienceTermButton({ term, entry, onSelect }) {
      const openEntry = (event) => {
        const parentControl = event?.currentTarget?.closest?.('button, a[href]');
        if (parentControl) return;
        event?.preventDefault?.();
        event?.stopPropagation?.();
        const selectedEntry = { ...entry, matchedTerm: term };
        if (onSelect) {
          onSelect(selectedEntry);
        } else if (typeof window !== 'undefined' && typeof window.__openScienceWord === 'function') {
          window.__openScienceWord(selectedEntry);
        }
      };

      return (
        <span
          role="button"
          tabIndex={0}
          data-science-term="true"
          className="science-word-link inline align-baseline rounded-md px-0.5"
          onClick={openEntry}
          onKeyDown={(event) => {
            if (event.key === 'Enter' || event.key === ' ') openEntry(event);
          }}
        >
          {term}
        </span>
      );
    }

    function decorateScienceString(text, onSelect, keyPrefix = 'science') {
      if (!text) return null;
      const value = String(text);
      SCIENCE_GLOSSARY_PATTERN.lastIndex = 0;
      const pieces = [];
      let lastIndex = 0;

      value.replace(SCIENCE_GLOSSARY_PATTERN, (match, _captured, offset) => {
        const entry = glossaryEntryFor(match);
        if (!entry) return match;
        if (offset > lastIndex) pieces.push(value.slice(lastIndex, offset));
        pieces.push(
          <ScienceTermButton
            key={`${keyPrefix}-${offset}-${match}`}
            term={match}
            entry={entry}
            onSelect={onSelect}
          />
        );
        lastIndex = offset + match.length;
        return match;
      });

      if (!pieces.length) return value;
      if (lastIndex < value.length) pieces.push(value.slice(lastIndex));
      return pieces;
    }

    function renderScienceText(text, onSelect) {
      return decorateScienceString(text, onSelect);

      const [badgeCelebration, setBadgeCelebration] = useState(null);
      const [fieldStamp, setFieldStamp] = useState(null);
      const [tapRipples, setTapRipples] = useState([]);
      const [stageProgress, setStageProgress] = useState({});
      const [notebookStatus, setNotebookStatus] = useState(null);
      const [notebookDrawerOpen, setNotebookDrawerOpen] = useState(false);
      const [missionDebrief, setMissionDebrief] = useState(null);
      const [globalScienceTerm, setGlobalScienceTerm] = useState(null);
      const [shellScrolled, setShellScrolled] = useState(false);
      const stageNavRef = useRef(null);
      const stageContentRef = useRef(null);
      const celebrationTimerRef = useRef(null);
      const fieldStampTimerRef = useRef(null);
      const rippleTimersRef = useRef([]);
      const initialLinkedStageIdRef = useRef(readLinkedStageId());
      const routeSyncReadyRef = useRef(false);
      const suppressNextRouteSyncRef = useRef(false);

      const stages = [
        { id: 'intro', title: "Start Journey", icon: <Zap size={20} />, badge: { name: 'First Flash', how: 'Begin the expedition from the welcome screen.', colors: ['#facc15', '#22c55e', '#fef08a', '#0f172a'] } },
        { id: 'familytree', title: "Family Tree", icon: <Dna size={20} />, badge: { name: 'Lampyridae Lineage', how: 'Place every family-tree clue on the correct branch.', colors: ['#34d399', '#0ea5e9', '#bef264', '#052e16'] } },
        { id: 'science', title: "Bioluminescence", icon: <LightbulbOff size={20} />, badge: { name: 'Cold Light Chemist', how: 'Study all three lantern ingredients, then catalyze the glow.', colors: ['#facc15', '#7c3aed', '#67e8f9', '#1e1b4b'] } },
        { id: 'glowhall', title: "Glow Hall", icon: <Fish size={20} />, badge: { name: 'Glow Curator', how: 'Sort every glowing organism into its correct survival purpose.', colors: ['#22d3ee', '#84cc16', '#fef08a', '#083344'] } },
        { id: 'species', title: "Meet the Bugs", icon: <FireflySpeciesSvg speciesId="generic" className="h-7 w-7" label="Meet the Bugs nav firefly custom SVG" />, badge: { name: 'Species Scout', how: 'Open and study every signature species card.', colors: ['#fb923c', '#22c55e', '#facc15', '#431407'] } },
        { id: 'map', title: "Global Map", icon: <Globe size={20} />, badge: { name: 'Field Atlas', how: 'Collect every field stamp in both the United States and Worldwide maps.', colors: ['#38bdf8', '#2563eb', '#facc15', '#0c4a6e'] } },
        { id: 'tamagotchi', title: "Raise a Firefly", icon: <Sprout size={20} />, badge: { name: 'Larva Guardian', how: 'Guide the egg, larva, and pupa through a scientifically grounded 24-month habitat simulation.', colors: ['#84cc16', '#16a34a', '#fde047', '#14532d'] } },
        { id: 'buildabug', title: "Build-a-Bug", icon: <Dna size={20} />, badge: { name: 'Evolution Engineer', how: 'Run a simulation with traits that successfully fit the habitat.', colors: ['#60a5fa', '#a78bfa', '#67e8f9', '#1e3a8a'] } },
        { id: 'researcher', title: "Field Survey", icon: <Search size={20} />, badge: { name: 'Canopy Researcher', how: 'Tag every assigned target firefly with no missed bugs or false positives.', colors: ['#38bdf8', '#1d4ed8', '#fef08a', '#082f49'] } },
        { id: 'pollution', title: "Light Pollution", icon: <Flashlight size={20} />, badge: { name: 'Dark Sky Defender', how: 'Create a critical light-pollution warning, then restore the habitat to a dark sky.', colors: ['#fb923c', '#facc15', '#ffffff', '#431407'] } },
        { id: 'ecosystem', title: "Ecosystem Role", icon: <Leaf size={20} />, badge: { name: 'Food Web Steward', how: 'Explore the food web, health signal, and rescue plan tabs.', colors: ['#22c55e', '#14b8a6', '#bef264', '#064e3b'] } },
        { id: 'sanctuary', title: "Sanctuary Yard", icon: <HeartHandshake size={20} />, badge: { name: 'Sanctuary Designer', how: 'Build a yard with at least 85% habitat health.', colors: ['#16a34a', '#f97316', '#fef08a', '#14532d'] } },
        { id: 'trivia', title: "100 Fun Facts", icon: <HelpCircle size={20} />, badge: { name: 'Trivia Spark', how: 'Answer 10 firefly trivia questions correctly.', colors: ['#facc15', '#ec4899', '#fde68a', '#701a75'] } },
        { id: 'conservation', title: "Ranger Test", icon: <ShieldCheck size={20} />, badge: { name: 'Master Ranger', how: 'Pass the ranger rescue test, then take the Firefly Ranger pledge.', colors: ['#22c55e', '#0f766e', '#facc15', '#052e16'] } },
      ].map(stage => ({ ...stage, href: stageHrefFor(stage.id) }));

      const activeBadge = stages.find(stage => stage.id === activeBadgeId) || stages[0];
      const currentStageMeta = stages[currentStage] || stages[0];
      const activeBadgeIsCurrent = activeBadge.id === currentStageMeta.id;
      const celebrationStage = badgeCelebration ? stages.find(stage => stage.id === badgeCelebration.stageId) : null;
      const fieldStampStage = fieldStamp ? stages.find(stage => stage.id === fieldStamp.stageId) : null;
      const stageGlow = currentStageMeta.badge.colors[2] || currentStageMeta.badge.colors[0];
      const stageSoftGlow = `${(currentStageMeta.badge.colors[0] || '#facc15').slice(0, 7)}24`;
      const earnedCount = earnedBadgeIds.filter(id => stages.some(stage => stage.id === id)).length;
      const isBadgeEarned = (stageId) => earnedBadgeIds.includes(stageId);
      const currentMission = QUEST_MISSIONS[currentStageMeta.id] || null;
      const currentStageProgress = stageProgress[currentStageMeta.id] || null;
      const nextUnfinishedIndex = stages.findIndex(stage => !isBadgeEarned(stage.id));
      const nextUnfinishedStage = nextUnfinishedIndex >= 0 ? stages[nextUnfinishedIndex] : null;
      const savedStageIds = stages.filter(stage => hasSavedNotebookForStage(stage.id)).map(stage => stage.id);
      const reportStageProgress = useCallback((stageId, progress) => {
        setStageProgress(prev => {
          if (!progress) {
            if (!Object.prototype.hasOwnProperty.call(prev, stageId)) return prev;
            const next = { ...prev };
            delete next[stageId];
            return next;
          }
          if (JSON.stringify(prev[stageId] || null) === JSON.stringify(progress)) return prev;
          return { ...prev, [stageId]: progress };
        });
      }, []);
      const reportNotebookStatus = useCallback((stageId, status) => {
        setNotebookStatus(prev => {
          const next = status ? { stageId, ...status } : null;
          if (JSON.stringify(prev || null) === JSON.stringify(next || null)) return prev;
          return next;
        });
      }, []);
      const openStage = (stageIndex) => {
        const boundedIndex = Math.max(0, Math.min(stages.length - 1, stageIndex));
        setCurrentStage(boundedIndex);
        setActiveBadgeId(stages[boundedIndex].id);
      };
      const resumeNextMission = () => {
        if (nextUnfinishedIndex >= 0) openStage(nextUnfinishedIndex);
      };
      const workOnCurrentMission = () => {
        const content = stageContentRef.current;
        if (!content) return;
        content.scrollIntoView({ behavior: 'smooth', block: 'start' });
        window.setTimeout(() => content.focus?.({ preventScroll: true }), 260);
      };
      const closeNotebookDrawer = useCallback(() => setNotebookDrawerOpen(false), []);
      const closeMissionDebrief = useCallback(() => setMissionDebrief(null), []);
      const closeGlobalScienceTerm = useCallback(() => setGlobalScienceTerm(null), []);
      const continueFromDebrief = (stageIndex) => {
        setMissionDebrief(null);
        openStage(stageIndex);
      };
      const reviewFromDebrief = (stageIndex) => {
        setMissionDebrief(null);
        openStage(stageIndex);
      };
      const openPassportFromDebrief = () => {
        setMissionDebrief(null);
        setNotebookDrawerOpen(true);
      };
      const advanceStage = () => setCurrentStage(prev => Math.min(prev + 1, stages.length - 1));
      const unlockBadge = (stageId) => {
        setEarnedBadgeIds(prev => prev.includes(stageId) ? prev : [...prev, stageId]);
      };
      const earnBadge = (stageId, options = {}) => {
        const { showDebrief = true } = options;
        const alreadyEarned = earnedBadgeIds.includes(stageId);
        unlockBadge(stageId);
        setActiveBadgeId(stageId);
        if (!alreadyEarned) {
          const token = Date.now();
          window.clearTimeout(celebrationTimerRef.current);
          setBadgeCelebration({ stageId, token });
          if (showDebrief) setMissionDebrief({ stageId, token });
          celebrationTimerRef.current = window.setTimeout(() => setBadgeCelebration(null), 2450);
        }
        window.clearTimeout(fieldStampTimerRef.current);
        setFieldStamp({ stageId, token: Date.now() });
        fieldStampTimerRef.current = window.setTimeout(() => setFieldStamp(null), 1850);
      };
      const completeStage = (stageId, options = {}) => {
        earnBadge(stageId, options);
        const stageIndex = stages.findIndex(stage => stage.id === stageId);
        setCurrentStage(Math.min(stageIndex + 1, stages.length - 1));
      };

      const handleShellPointerMove = (event) => {
        const bounds = event.currentTarget.getBoundingClientRect();
        event.currentTarget.style.setProperty('--pointer-x', `${event.clientX - bounds.left}px`);
        event.currentTarget.style.setProperty('--pointer-y', `${event.clientY - bounds.top}px`);
        event.currentTarget.style.setProperty('--pointer-opacity', '1');
      };

      const handleShellPointerLeave = (event) => {
        event.currentTarget.style.setProperty('--pointer-opacity', '0');
      };

      const handleShellClick = (event) => {
        const target = event.target;
        const interactive = target instanceof Element
          ? target.closest('button, [role="button"], input[type="range"], a[href]')
          : null;
        if (!interactive || interactive.disabled || interactive.getAttribute('aria-disabled') === 'true') return;
        const ripple = {
          id: `${Date.now()}-${Math.random()}`,
          x: event.clientX,
          y: event.clientY,
          glow: stageGlow
        };
        setTapRipples(prev => [...prev.slice(-8), ripple]);
        const timer = window.setTimeout(() => {
          setTapRipples(prev => prev.filter(item => item.id !== ripple.id));
        }, 820);
        rippleTimersRef.current.push(timer);
      };

      useEffect(() => {
        try {
          window.localStorage.setItem('firefly-academy-earned-badges', JSON.stringify(earnedBadgeIds));
        } catch {}
      }, [earnedBadgeIds]);

      useEffect(() => {
        if (currentStage < 0 || currentStage >= stages.length) {
          setCurrentStage(Math.max(0, Math.min(stages.length - 1, currentStage)));
          return;
        }
        try {
          window.localStorage.setItem('firefly-academy-current-stage', String(currentStage));
        } catch {}
      }, [currentStage, stages.length]);

      useEffect(() => {
        setActiveBadgeId(currentStageMeta.id);
      }, [currentStageMeta.id]);

      useEffect(() => {
        document.title = `${currentStageMeta.title} | Global Firefly Academy`;
      }, [currentStageMeta.title]);

      useEffect(() => {
        window.__openScienceWord = setGlobalScienceTerm;
        return () => {
          if (window.__openScienceWord === setGlobalScienceTerm) delete window.__openScienceWord;
        };
      }, []);

      useEffect(() => {
        const activeStageButton = stageNavRef.current?.querySelector(`[data-stage-index="${currentStage}"]`);
        activeStageButton?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }, [currentStage]);

      useEffect(() => {
        const handleScroll = () => setShellScrolled(window.scrollY > 48);
        handleScroll();
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        const handlePopState = (event) => {
          const stageId = event.state?.stageId || readLinkedStageId();
          if (!stageId || !Number.isInteger(STAGE_INDEX_BY_ID[stageId])) return;
          suppressNextRouteSyncRef.current = true;
          setCurrentStage(STAGE_INDEX_BY_ID[stageId]);
          setActiveBadgeId(stageId);
        };
        window.addEventListener('popstate', handlePopState);
        return () => window.removeEventListener('popstate', handlePopState);
      }, []);

      useEffect(() => {
        if (!routeSyncReadyRef.current) {
          routeSyncReadyRef.current = true;
          if (initialLinkedStageIdRef.current) syncStageUrl(currentStageMeta.id, { replace: true });
          return;
        }
        if (suppressNextRouteSyncRef.current) {
          suppressNextRouteSyncRef.current = false;
          return;
        }
        syncStageUrl(currentStageMeta.id);
      }, [currentStageMeta.id]);

      useEffect(() => {
        return () => {
          window.clearTimeout(celebrationTimerRef.current);
          window.clearTimeout(fieldStampTimerRef.current);
          rippleTimersRef.current.forEach(timer => window.clearTimeout(timer));
        };
      }, []);

      return (
        <div
          className="lantern-shell isolate min-h-screen bg-slate-950 text-slate-100 font-sans selection:bg-yellow-500/30 flex flex-col relative overflow-hidden twinkle-bg"
          onPointerMove={handleShellPointerMove}
          onClick={handleShellClick}
          onPointerLeave={handleShellPointerLeave}
          style={{ '--stage-glow': stageGlow, '--stage-glow-soft': stageSoftGlow }}
        >
          <FireflyStyles />
          <AmbientFireflies stage={currentStageMeta} />
          <TapRippleLayer ripples={tapRipples} />
          <BadgeCelebration stage={celebrationStage} token={badgeCelebration?.token} />
          <FieldNotebookStamp stage={fieldStampStage} token={fieldStamp?.token} />
          <MissionDebriefDialog
            debrief={missionDebrief}
            stages={stages}
            savedStageIds={savedStageIds}
            onContinue={continueFromDebrief}
            onReview={reviewFromDebrief}
            onOpenPassport={openPassportFromDebrief}
            onClose={closeMissionDebrief}
          />
          <ScienceWordDialog entry={globalScienceTerm} onClose={closeGlobalScienceTerm} />
          <FieldPassportDrawer
            open={notebookDrawerOpen}
            stages={stages}
            currentStage={currentStage}
            earnedBadgeIds={earnedBadgeIds}
            stageProgress={stageProgress}
            savedStageIds={savedStageIds}
            nextStage={nextUnfinishedStage}
            onOpenStage={openStage}
            onClose={closeNotebookDrawer}
          />
          
          <header className={`academy-header ${shellScrolled ? 'is-scrolled' : ''} p-2 sm:p-3 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50 shadow-lg`}>
            <div className="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2 sm:gap-4">
              <div className="flex items-center gap-3">
                <div className="p-1.5 sm:p-2 bg-yellow-500/20 rounded-xl border border-yellow-500/30">
                  <FireflySpeciesSvg speciesId="generic" className="h-7 w-7 sm:h-8 sm:w-8" label="Header firefly custom SVG" />
                </div>
                <h1 className="text-xl sm:text-2xl font-black leading-tight tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-green-400">
                  Global Firefly Academy
                </h1>
              </div>
              
              <div className="flex max-w-full min-w-0 items-center gap-1.5 sm:gap-2">
                <button
                  type="button"
                  onClick={() => setNotebookDrawerOpen(true)}
                  aria-expanded={notebookDrawerOpen}
                  aria-label="Open field notebook passport"
                  className="inline-flex min-h-[2.5rem] shrink-0 items-center justify-center gap-2 rounded-full border border-yellow-300/30 bg-yellow-300/10 px-3 py-2 text-xs font-black uppercase tracking-wider text-yellow-100 transition-all hover:border-yellow-300/60 hover:bg-yellow-300/15 active:scale-95 sm:px-4"
                >
                  <FileText size={16} />
                  <span className="hidden xl:inline">Notebook</span>
                  <span className="rounded-full bg-slate-950/80 px-2 py-0.5 text-yellow-200">{savedStageIds.length}</span>
                </button>
                <div className="flex max-w-full items-center gap-1.5 overflow-x-auto rounded-full border border-slate-700/50 bg-slate-800/50 p-1.5 px-2 sm:gap-2 sm:p-2 sm:px-3 custom-scrollbar">
                  <span className="text-xs sm:text-sm font-bold text-slate-300 mr-1 uppercase tracking-wider shrink-0">Badges {earnedCount}/{stages.length}</span>
                  {stages.map(stage => {
                    const earned = isBadgeEarned(stage.id);
                    const isSelected = activeBadgeId === stage.id;
                    return (
                      <button
                        key={stage.id}
                        onClick={() => setActiveBadgeId(stage.id)}
                        aria-label={`${stage.badge.name}: ${earned ? 'earned' : 'locked'}`}
                        aria-pressed={isSelected}
                        title={`${stage.badge.name} - ${earned ? 'earned' : 'locked'}`}
                        className={`relative h-8 w-8 sm:h-9 sm:w-9 shrink-0 rounded-full transition-all duration-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-yellow-300 ${earned ? 'shadow-[0_0_14px_rgba(250,204,21,0.45)] hover:scale-110' : 'opacity-70 hover:opacity-100'} ${isSelected ? 'scale-110 ring-2 ring-yellow-300' : ''}`}
                      >
                        <BadgeIcon stage={stage} earned={earned} className="h-full w-full" />
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            <div className="badge-summary-panel polished-surface mt-2 sm:mt-3 max-w-5xl mx-auto bg-slate-950/75 border border-slate-800 rounded-xl sm:rounded-2xl p-2 sm:p-3 flex flex-row items-center gap-2 sm:gap-4 shadow-xl">
              <BadgeIcon stage={activeBadge} earned={isBadgeEarned(activeBadge.id)} className="h-10 w-10 sm:h-14 sm:w-14 shrink-0" />
              <div className="flex-1 text-left min-w-0">
                <div className="flex flex-wrap items-center gap-2">
                  <h2 className="text-base sm:text-lg font-black text-white">{activeBadge.badge.name}</h2>
                  <span className={`px-2 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${activeBadgeIsCurrent ? 'bg-yellow-300 text-slate-950' : 'bg-cyan-400/10 text-cyan-200 border border-cyan-300/20'}`}>
                    {activeBadgeIsCurrent ? 'Current Mission' : 'Badge Preview'}
                  </span>
                  <span className={`px-2 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${isBadgeEarned(activeBadge.id) ? 'bg-green-400 text-slate-950' : 'bg-slate-800 text-slate-300 border border-slate-700'}`}>
                    {isBadgeEarned(activeBadge.id) ? 'Earned' : 'Locked'}
                  </span>
                </div>
                <p className="hidden sm:block text-sm text-slate-300 mt-1">{activeBadge.badge.how}</p>
                <p className="hidden sm:block text-xs text-slate-500 mt-1">Section: {activeBadge.title}</p>
              </div>
              <button
                onClick={() => {
                  const stageIndex = stages.findIndex(stage => stage.id === activeBadge.id);
                  openStage(stageIndex);
                }}
                className="hidden sm:flex px-4 py-2 rounded-full bg-slate-800 hover:bg-slate-700 text-slate-100 text-sm font-bold items-center gap-2 shrink-0 border border-slate-700"
              >
                Open Section <ArrowRight size={15} />
              </button>
            </div>
          </header>

          <main className="relative z-10 flex-1 max-w-6xl w-full mx-auto p-3 sm:p-5 lg:p-6 flex flex-col">
            {/* Progress Bar */}
            <nav
              ref={stageNavRef}
              aria-label="Lab selection"
              className="stage-nav-scroll mb-4 w-full snap-x snap-mandatory overflow-x-auto overflow-y-hidden custom-scrollbar pb-3 -mx-3 px-3 sm:-mx-5 sm:px-5 lg:-mx-6 lg:px-6"
            >
              <div className="relative flex min-w-max items-start gap-4 sm:gap-5 px-2 pt-2">
                <div className="pointer-events-none absolute left-8 right-8 top-7 sm:top-8 h-1 bg-slate-800 rounded-full"></div>
                <div
                  className="pointer-events-none absolute left-8 top-7 sm:top-8 h-1 bg-gradient-to-r from-yellow-400 to-green-400 rounded-full transition-all duration-500"
                  style={{ width: `calc((100% - 4rem) * ${currentStage / (stages.length - 1)})` }}
                ></div>
                <div
                  className="stage-progress-spark pointer-events-none z-20"
                  aria-hidden="true"
                  style={{ left: `calc(2rem + (100% - 4rem) * ${currentStage / (stages.length - 1)})` }}
                ></div>
              
              {stages.map((stage, idx) => {
                const isCompleted = isBadgeEarned(stage.id);
                const isCurrent = currentStage === idx;
                return (
                  <a
                    key={stage.id}
                    href={stage.href}
                    data-stage-index={idx}
                    onClick={(event) => {
                      event.preventDefault();
                      openStage(idx);
                    }}
                    aria-current={isCurrent ? 'step' : undefined}
                    className="group relative z-10 flex w-24 shrink-0 snap-center flex-col items-center gap-2 transition-all hover:scale-110 cursor-pointer sm:w-28"
                  >
                    <div className={`w-9 h-9 lg:w-10 lg:h-10 rounded-full flex items-center justify-center border-4 transition-transform duration-300 ${isCurrent ? 'bg-slate-900 border-yellow-400 text-yellow-400 scale-125 shadow-[0_0_15px_rgba(250,204,21,0.5)]' : isCompleted ? 'bg-green-500 border-green-400 text-slate-900' : 'bg-slate-800 border-slate-600 text-slate-400 group-hover:border-slate-400'}`}>
                      {isCompleted && !isCurrent ? <CheckCircle size={18} /> : stage.icon}
                    </div>
                    <span className={`text-[10px] lg:text-xs font-bold px-2 rounded-md whitespace-nowrap ${isCurrent ? 'bg-slate-900 text-white' : 'text-slate-400 group-hover:text-slate-200'}`}>{stage.title}</span>
                  </a>
                )
              })}
              </div>
            </nav>

            <QuestCompass
              stage={currentStageMeta}
              stageIndex={currentStage}
              totalStages={stages.length}
              mission={currentMission}
              progress={currentStageProgress}
              isEarned={isBadgeEarned(currentStageMeta.id)}
              earnedCount={earnedCount}
              totalBadges={stages.length}
              nextStage={nextUnfinishedStage}
              notebookStatus={notebookStatus?.stageId === currentStageMeta.id ? notebookStatus : null}
              onResumeNext={resumeNextMission}
              onWorkHere={workOnCurrentMission}
              onViewBadge={() => setActiveBadgeId(currentStageMeta.id)}
            />

            {/* Stage Renderer */}
            <div ref={stageContentRef} tabIndex="-1" className="flex-1 flex flex-col relative min-h-0 focus:outline-none">
              {currentStage === 0 && <StageIntro onComplete={() => completeStage('intro')} onProgress={(progress) => reportStageProgress('intro', progress)} />}
              {currentStage === 1 && <StageFamilyTree onComplete={() => completeStage('familytree')} onProgress={(progress) => reportStageProgress('familytree', progress)} onNotebookStatus={(status) => reportNotebookStatus('familytree', status)} />}
              {currentStage === 2 && <StageScience onComplete={() => completeStage('science')} onProgress={(progress) => reportStageProgress('science', progress)} onNotebookStatus={(status) => reportNotebookStatus('science', status)} />}
              {currentStage === 3 && <StageGlowHall onComplete={() => completeStage('glowhall')} onProgress={(progress) => reportStageProgress('glowhall', progress)} onNotebookStatus={(status) => reportNotebookStatus('glowhall', status)} />}
              {currentStage === 4 && <StageSpecies onComplete={() => completeStage('species')} onEarn={() => earnBadge('species')} onProgress={(progress) => reportStageProgress('species', progress)} />}
              {currentStage === 5 && <StageMap onComplete={() => completeStage('map')} onEarn={() => earnBadge('map')} onProgress={(progress) => reportStageProgress('map', progress)} />}
              {currentStage === 6 && <StageTamagotchi onComplete={() => completeStage('tamagotchi')} onSkip={advanceStage} onProgress={(progress) => reportStageProgress('tamagotchi', progress)} />}
              {currentStage === 7 && <StageBuildABug onComplete={() => completeStage('buildabug')} onProgress={(progress) => reportStageProgress('buildabug', progress)} onNotebookStatus={(status) => reportNotebookStatus('buildabug', status)} />}
              {currentStage === 8 && <StageResearcher onComplete={() => completeStage('researcher')} onSkip={advanceStage} onProgress={(progress) => reportStageProgress('researcher', progress)} />}
              {currentStage === 9 && <StageLightPollution onComplete={() => completeStage('pollution')} onProgress={(progress) => reportStageProgress('pollution', progress)} onNotebookStatus={(status) => reportNotebookStatus('pollution', status)} />}
              {currentStage === 10 && <StageEcosystem onComplete={() => completeStage('ecosystem')} onEarn={() => earnBadge('ecosystem')} onProgress={(progress) => reportStageProgress('ecosystem', progress)} />}
              {currentStage === 11 && <StageSanctuary onComplete={() => completeStage('sanctuary')} onProgress={(progress) => reportStageProgress('sanctuary', progress)} onNotebookStatus={(status) => reportNotebookStatus('sanctuary', status)} />}
              {currentStage === 12 && <StageTrivia onComplete={() => completeStage('trivia')} onSkip={advanceStage} onProgress={(progress) => reportStageProgress('trivia', progress)} />}

    }

    // --- STAGE 5: LIFE-CYCLE TAMAGOTCHI ---
    function StageTamagotchi({ onComplete, onSkip, onProgress }) {
      const startingLog = [
        { id: 'start', text: 'Field log opened: eggs are tucked into damp leaf litter, rotting wood, or protected soil.' }
      ];

      const lifeStages = [
        {
          id: 'egg',
          label: 'Egg',
          months: 'Month 0',
          icon: <Sprout size={18} />,
          visual: 'egg',
          color: 'text-lime-300',
          lesson: 'Fireflies undergo complete metamorphosis: egg, larva, pupa, and adult. Eggs need protected, damp places.'
        },
        {
          id: 'larva',
          label: 'Larva',
          months: 'Months 1-20',
          icon: <LifeCycleSvg stageId="larva" className="h-5 w-5" />,
          visual: 'larva',
          color: 'text-green-300',
          lesson: 'Most of the life cycle is spent as a larva. Larvae hunt soft-bodied invertebrates such as snails, slugs, worms, and insect larvae.'
        },
        {
          id: 'pupa',
          label: 'Pupa',
          months: 'Months 21-23',
          icon: <ShieldCheck size={18} />,
          visual: 'pupa',
          color: 'text-cyan-300',
          lesson: 'Many fireflies pupate underground or in rotting logs, though some species use bark furrows or other protected places.'
        },
        {
          id: 'adult',
          label: 'Adult',
          months: 'Month 24',
          icon: <LifeCycleSvg stageId="adult" className="h-5 w-5" />,
          visual: 'adult',
          color: 'text-yellow-300',
          lesson: 'Adults often live only a few weeks. Some flash, some glow, and some daytime species rely more on pheromones than light.'
        }
      ];

      const getLifeStage = (value) => {
        if (value < 1) return lifeStages[0];
        if (value < 21) return lifeStages[1];
        if (value < 24) return lifeStages[2];
        return lifeStages[3];
      };

      const getSeason = (value) => {
        const monthInYear = value % 12;
        if (monthInYear <= 2) return { id: 'late-summer', label: 'Late Summer', note: 'Eggs and young larvae need damp cover near the ground.', accent: 'text-amber-300' };
        if (monthInYear <= 5) return { id: 'fall', label: 'Fall', note: 'Leaf litter and logs become overwintering shelter.', accent: 'text-orange-300' };
        if (monthInYear <= 8) return { id: 'winter', label: 'Winter', note: 'Larvae slow down under leaves, bark, or soil.', accent: 'text-blue-300' };
        return { id: 'spring', label: 'Spring', note: 'Warm, wet nights bring prey and later adult displays.', accent: 'text-green-300' };
      };

      const challenges = [
        {
          id: 'dry-soil',
          title: 'Dry Soil Alert',
          body: 'The leaf litter is drying out. Firefly larvae and their prey do best in moist, protected microhabitats.',
          need: 'moisture',
          min: 48,
          response: 'Mist the soil or add leaf litter before the next month passes.',
          icon: <Waves size={24} className="text-cyan-300" />,
          stageIds: ['egg', 'larva', 'pupa']
        },
        {
          id: 'prey-gap',
          title: 'Prey Is Scarce',
          body: 'The larva is ready to hunt. In real habitats it would seek soft-bodied invertebrates in damp soil or leaf litter.',
          need: 'food',
          min: 44,
          response: 'Offer soft-bodied prey to rebuild its food reserve.',
          icon: <FoodWebCreatureSvg type="snails" className="h-10 w-10" />,
          stageIds: ['larva']
        },
        {
          id: 'mower',
          title: 'Ground Disturbance',
          body: 'Short mowing, raking, or tilling can remove the cover where larvae and pupae hide.',
          need: 'shelter',
          min: 54,
          response: 'Add leaves and rotting wood to thicken the shelter layer.',
          icon: <Scissors size={24} className="text-red-300" />,
          stageIds: ['larva', 'pupa'],
          seasons: ['spring', 'late-summer', 'fall']
        },
        {
          id: 'pesticide-drift',
          title: 'Pesticide Drift',
          body: 'Broad-spectrum insecticides can harm fireflies and can also reduce the prey larvae depend on.',
          need: 'shelter',
          min: 50,
          response: 'Keep the refuge wild and pesticide-free by building protected cover.',
          icon: <AlertTriangle size={24} className="text-orange-300" />,
          stageIds: ['egg', 'larva', 'pupa']
        },
        {
          id: 'porch-light',
          title: 'Bright Porch Light',
          body: 'The adult is close to emerging. For flashing fireflies, artificial light can interfere with mating signals on summer nights.',
          need: 'darkness',
          min: 58,
          response: 'Dim the lights now so adult signals can be seen after emergence.',
          icon: <LightbulbOff size={24} className="text-yellow-200" />,
          stageIds: ['pupa', 'adult']
        }
      ];

      const [gameState, setGameState] = useState('intro'); // intro, playing, gameover, success
      const [month, setMonth] = useState(0);
      const [food, setFood] = useState(82);
      const [moisture, setMoisture] = useState(82);
      const [shelter, setShelter] = useState(82);
      const [darkness, setDarkness] = useState(82);
      const [activeChallenge, setActiveChallenge] = useState(null);
      const [observationLog, setObservationLog] = useState(startingLog);
      const [activeLesson, setActiveLesson] = useState(lifeStages[0].lesson);
      const [careStreak, setCareStreak] = useState(0);
      const [deathReason, setDeathReason] = useState('');
      const [activeSnails, setActiveSnails] = useState([]);
      const [fallingLeaves, setFallingLeaves] = useState([]);
      const [waterDrops, setWaterDrops] = useState([]);
      const [isEating, setIsEating] = useState(false);
      const [statFeedback, setStatFeedback] = useState({});
      const statsRef = useRef({ food: 82, moisture: 82, shelter: 82, darkness: 82 });

      const currentLife = getLifeStage(month);
      const season = getSeason(month);
      const progress = Math.min(100, (month / 24) * 100);
      const habitatAverage = Math.round((food + moisture + shelter + darkness) / 4);
      const showLarva = currentLife.id === 'larva';
      const showPupa = currentLife.id === 'pupa';
      const showAdult = currentLife.id === 'adult';
      const threatIsActive = Boolean(activeChallenge);

      useEffect(() => {
        onProgress?.({
          value: month,
          total: 24,
          label: `${month}/24 months guided`,
          nudge: gameState === 'success'
            ? 'Metamorphosis is complete. Continue while the adult lantern is shining.'
            : gameState === 'gameover'
              ? 'The refuge failed. Restart the life cycle and stabilize the weakest habitat need.'
              : gameState === 'playing'
                ? activeChallenge
                  ? `${activeChallenge.title}: lift ${activeChallenge.need} before time passes.`
                  : `${currentLife.label} stage is stable at ${habitatAverage}% habitat health.`
                : 'Start the life-cycle simulation to guide the egg through adulthood.',
          steps: [
            { label: 'Start the life cycle', status: gameState === 'intro' ? 'active' : 'done' },
            { label: 'Balance food, water, shelter, and darkness', status: gameState === 'success' ? 'done' : gameState === 'playing' || gameState === 'gameover' ? 'active' : 'locked' },
            { label: 'Guide the pupa into adulthood', status: gameState === 'success' ? 'done' : month >= 21 ? 'active' : 'locked' }
          ]
        });
      }, [month, gameState, currentLife.label, habitatAverage, activeChallenge?.id, activeChallenge?.need, onProgress]);

      const staticLeafPositions = useMemo(() => {
        return Array.from({ length: 58 }).map(() => ({
          left: Math.random() * 90 + 5,
          bottom: Math.random() * 27,
          rotation: Math.random() * 360,
          size: Math.random() > 0.72 ? 22 : 17,
          color: ['text-orange-500', 'text-yellow-600', 'text-red-500', 'text-amber-500'][Math.floor(Math.random() * 4)]
        }));
      }, []);

      const addLog = (text) => {
        setObservationLog(prev => [{ id: `${Date.now()}-${Math.random()}`, text }, ...prev].slice(0, 5));
      };

      const clampPercent = (value) => Math.max(0, Math.min(100, value));

      const setStatByKey = (key, value) => {
        if (key === 'food') setFood(value);
        if (key === 'moisture') setMoisture(value);
        if (key === 'shelter') setShelter(value);
        if (key === 'darkness') setDarkness(value);
      };

      const showStatFeedback = (key, amount) => {
        const token = `${Date.now()}-${Math.random()}`;
        setStatFeedback(prev => ({ ...prev, [key]: { amount, token } }));
        setTimeout(() => {
          setStatFeedback(prev => {
            if (prev[key]?.token !== token) return prev;
            const next = { ...prev };
            delete next[key];
            return next;
          });
        }, 900);
      };

      const boostStat = (key, amount) => {
        const before = statsRef.current[key];
        const after = clampPercent(before + amount);
        statsRef.current = { ...statsRef.current, [key]: after };
        setStatByKey(key, after);
        showStatFeedback(key, Math.round(after - before));
        return Math.round(after - before);
      };

      const resetGame = () => {
        statsRef.current = { food: 82, moisture: 82, shelter: 82, darkness: 82 };
        setMonth(0);
        setFood(82);
        setMoisture(82);
        setShelter(82);
        setDarkness(82);
        setActiveChallenge(null);
        setObservationLog(startingLog);
        setActiveLesson(lifeStages[0].lesson);
        setCareStreak(0);
        setDeathReason('');
        setActiveSnails([]);
        setFallingLeaves([]);
        setWaterDrops([]);
        setIsEating(false);
        setStatFeedback({});
        setGameState('playing');
      };

      const statValue = (need, stats = statsRef.current) => {
        if (need === 'food') return stats.food;
        if (need === 'moisture') return stats.moisture;
        if (need === 'shelter') return stats.shelter;
        return stats.darkness;
      };

      const chooseChallenge = (nextMonth, stats = statsRef.current) => {
        const nextStage = getLifeStage(nextMonth);
        const nextSeason = getSeason(nextMonth);
        const eligible = challenges.filter(challenge => (
          challenge.stageIds.includes(nextStage.id) &&
          (!challenge.seasons || challenge.seasons.includes(nextSeason.id))
        ));
        if (!eligible.length) return null;
        const lowNeed = eligible
          .filter(challenge => statValue(challenge.need, stats) < challenge.min + 12)
          .sort((a, b) => statValue(a.need, stats) - statValue(b.need, stats))[0];
        return lowNeed || eligible[Math.floor(Math.random() * eligible.length)];
      };

      useEffect(() => {
        if (gameState !== 'playing') return;
        const interval = setInterval(() => {
          if (activeChallenge) {
            const currentStat = statValue(activeChallenge.need);
            if (currentStat < activeChallenge.min) {
              setDeathReason(`${activeChallenge.title}: ${activeChallenge.body} ${activeChallenge.response}`);
              setGameState('gameover');
              return;
            }
            setCareStreak(prev => prev + 1);
            addLog(`Resolved: ${activeChallenge.title}. The habitat stayed above the safety threshold.`);
            setActiveChallenge(null);
          }

          const stage = getLifeStage(month);
          const currentSeason = getSeason(month);
          const nextMonth = month + 1;

          if (nextMonth >= 24) {
            setMonth(24);
            setGameState('success');
            setActiveLesson(lifeStages[3].lesson);
            addLog('Metamorphosis complete: an adult firefly emerged after a long hidden life stage.');
            return;
          }

          const drySeasonBoost = currentSeason.id === 'late-summer' ? 4 : 0;
          const winterBoost = currentSeason.id === 'winter' ? -2 : 0;
          const disturbanceBoost = currentSeason.id === 'spring' ? 3 : 0;
          const foodLoss = stage.id === 'larva' ? 8 + Math.random() * 6 : 1 + Math.random() * 2;
          const moistureLoss = Math.max(2, 4.5 + drySeasonBoost + winterBoost + Math.random() * 3.5);
          const shelterLoss = Math.max(1, 2.6 + disturbanceBoost + Math.random() * 2.8);
          const darknessLoss = stage.id === 'adult' ? 9 + Math.random() * 5 : 1 + Math.random() * 2;
          const nextStats = {
            food: clampPercent(statsRef.current.food - foodLoss),
            moisture: clampPercent(statsRef.current.moisture - moistureLoss),
            shelter: clampPercent(statsRef.current.shelter - shelterLoss),
            darkness: clampPercent(statsRef.current.darkness - darknessLoss)
          };
          statsRef.current = nextStats;

          setMonth(nextMonth);
          setFood(nextStats.food);
          setMoisture(nextStats.moisture);
          setShelter(nextStats.shelter);
          setDarkness(nextStats.darkness);

          const newStage = getLifeStage(nextMonth);
          if (newStage.id !== stage.id) {
            setActiveLesson(newStage.lesson);
            addLog(`Life stage changed: ${newStage.label}. ${newStage.lesson}`);
          } else if (Math.random() > 0.72) {
            addLog(`${getSeason(nextMonth).label}: ${getSeason(nextMonth).note}`);
          }

          if (!activeChallenge && Math.random() > 0.62) {
            const nextChallenge = chooseChallenge(nextMonth, nextStats);
            if (nextChallenge) {
              setActiveChallenge(nextChallenge);
              setActiveLesson(nextChallenge.body);
            }
          }
        }, 2000);

        return () => clearInterval(interval);
      }, [gameState, month, activeChallenge]);

      useEffect(() => {
        if (gameState !== 'playing') return;
        if (currentLife.id === 'larva' && food <= 0) {
          setDeathReason('Food web failure: firefly larvae are predators and need soft-bodied invertebrates such as snails, slugs, worms, and insect larvae.');
          setGameState('gameover');
        } else if (moisture <= 0) {
          setDeathReason('Moisture failure: dry soil and leaf litter can desiccate fireflies and reduce the prey larvae need.');
          setGameState('gameover');
        } else if (shelter <= 0) {

                    <p><strong className="text-white">{selectedColor.title}:</strong> {selectedColor.detail}</p>

    function SurveyFireflyMarker({ config, delay, tagged, className = 'h-8 w-8 sm:h-9 sm:w-9' }) {
      return (
        <svg
          viewBox="0 0 36 36"
          aria-hidden="true"
          className={`survey-firefly ${className} transition-transform duration-200 ${tagged ? 'scale-110' : 'group-hover:scale-110 group-focus-visible:scale-110'}`}
          style={{ color: config.glow }}
        >
          <ellipse className="survey-firefly-wing survey-firefly-wing-left" cx="12" cy="17" rx="5.8" ry="8.6" fill="#bae6fd" fillOpacity="0.5" stroke="#e0f2fe" strokeWidth="1.1" transform="rotate(-27 12 17)" />
          <ellipse className="survey-firefly-wing survey-firefly-wing-right" cx="24" cy="17" rx="5.8" ry="8.6" fill="#bae6fd" fillOpacity="0.5" stroke="#e0f2fe" strokeWidth="1.1" transform="rotate(27 24 17)" />
          <path d="M12 17 L6 20 M24 17 L30 20 M13 23 L8 29 M23 23 L28 29" stroke="#94a3b8" strokeWidth="1.6" strokeLinecap="round" opacity="0.75" />
          <ellipse cx="18" cy="18" rx="4.4" ry="10" fill="#78350f" stroke="#0f172a" strokeWidth="1.4" />
          <path d="M18 10 C16 15 16 22 18 28 M14 18 H22" stroke="#3f2612" strokeWidth="1" opacity="0.7" strokeLinecap="round" />
          <circle cx="18" cy="8.8" r="4.2" fill="#111827" stroke="#475569" strokeWidth="1" />
          <path d="M15.4 6 Q10 1.8 6.4 5.7 M20.6 6 Q26 1.8 29.6 5.7" stroke="#fde68a" strokeWidth="1.8" fill="none" strokeLinecap="round" />
          <circle
            cx="18"
            cy="27"
            r="5"
            className={config.anim}
            fill={config.glow}
            style={{
              animationDelay: delay,
              filter: `drop-shadow(0 0 8px ${config.glow}) drop-shadow(0 0 15px ${config.glow})`
            }}
          />
          <circle cx="18" cy="27" r="2.2" fill="#fef9c3" opacity="0.82" />
        </svg>
      );
    }

    // --- STAGE 7: FIELD RESEARCHER (CITIZEN SCIENCE) ---
    function StageResearcher({ onComplete, onSkip, onProgress }) {
      const [gameState, setGameState] = useState('intro'); // intro, playing, timeout_trigger, result
      const [bugs, setBugs] = useState([]);
      const [targetType, setTargetType] = useState('smoky');
      const [taggedIds, setTaggedIds] = useState([]);
      const [timeLeft, setTimeLeft] = useState(60);
      const [results, setResults] = useState(null);
      const [surveySiteId, setSurveySiteId] = useState('cove-edge');
      const [tagEvents, setTagEvents] = useState([]);

      const bugConfigs = {
        smoky: {
          name: 'Smoky Mountain Sync',
          desc: 'Flashes 5-10 times, then 6-10 seconds of darkness.',
          anim: 'animate-smoky',
          color: 'bg-orange-400',
          glow: '#fb923c',
          ecology: 'Synchronous displays let thousands of males signal together in moist Appalachian forests.',
          fieldClue: 'Count a whole burst, then wait through the dark pause before deciding.',
          mistakeTip: 'Snappy flashes look busy too, but they do not share the long silent reset.'
        },
        snappy: {
          name: 'Snappy Single Sync',
          desc: 'Continuous, rapid-fire strobe without long pauses.',
          anim: 'animate-snappy',
          color: 'bg-yellow-400',
          glow: '#facc15',
          ecology: 'Fast single flashes can blanket wet floodplain edges where adults search close to vegetation.',
          fieldClue: 'Look for a steady peppering of quick flashes instead of a burst-and-rest rhythm.',
          mistakeTip: 'Do not confuse it with synchronized bursts; snappy keeps flickering while smoky goes dark.'
        },
        ghost: {
          name: 'Blue Ghost',
          desc: 'Continuous, eerie bluish-green glow. Does not blink.',
          anim: 'animate-ghost',
          color: 'bg-cyan-400',
          glow: '#67e8f9',
          ecology: 'Blue ghosts glow low and steady near leaf litter, so careful observers move slowly and keep lights off.',
          fieldClue: 'Watch for a smooth floating ember with almost no blink rhythm.',
          mistakeTip: 'A camera-like blink means it is probably not a blue ghost.'
        }
      };

      const surveySites = [
        {
          id: 'cove-edge',
          name: 'Cove Forest Transect',
          habitat: 'Moist leaf litter, tulip poplar shade, and creek-edge humidity.',
          conditions: 'Moon tucked behind clouds, 73F, light breeze',
          method: 'Stand still for 20 seconds, scan left to right, then tag only the target pattern.',
          lesson: 'Real surveys record weather and effort so one quiet night is not mistaken for a population crash.',
          bg: 'from-emerald-950 via-slate-950 to-cyan-950'
        },
        {
          id: 'meadow-line',
          name: 'Meadow Edge Plot',
          habitat: 'Tall grasses, darker hedgerow pockets, and an open flight lane.',
          conditions: 'Clear sky, 70F, dry grass after sunset',
          method: 'Use a fixed viewing window; repeated counts are stronger than wandering counts.',
          lesson: 'Standardized transects help citizen-science data compare fairly across backyards and parks.',
          bg: 'from-lime-950 via-slate-950 to-sky-950'
        },
        {
          id: 'river-bend',
          name: 'River Bend Watch',
          habitat: 'Wet bank, fern cover, and reflected flashes near slow water.',
          conditions: 'High humidity, faint fog, insects active',
          method: 'Separate real lantern flashes from reflections before logging a count.',
          lesson: 'Habitat notes explain why some species cluster near damp soil while others fly higher.',
          bg: 'from-cyan-950 via-slate-950 to-emerald-950'
        }
      ];

      const surveySite = surveySites.find(site => site.id === surveySiteId) || surveySites[0];
      const targetConfig = bugConfigs[targetType];
      const patternCards = Object.entries(bugConfigs);

      const getSurveyStats = (ids = taggedIds) => {
        const targetBugs = bugs.filter(bug => bug.type === targetType);
        const targetCount = targetBugs.length;
        const correctTags = ids.filter(id => id.startsWith(targetType)).length;
        const incorrectTags = ids.length - correctTags;
        const missedTargets = Math.max(0, targetCount - correctTags);
        const precision = ids.length ? Math.round((correctTags / ids.length) * 100) : 100;
        const recall = targetCount ? Math.round((correctTags / targetCount) * 100) : 0;
        const qualityScore = Math.max(0, Math.round((precision * 0.45) + (recall * 0.55) - (incorrectTags * 9)));

        return {
          targetCount,
          correctTags,
          incorrectTags,
          missedTargets,
          precision,
          recall,
          qualityScore,
          success: targetCount > 0 && correctTags === targetCount && incorrectTags === 0
        };
      };

      const liveStats = getSurveyStats(taggedIds);
      const qualityTone = liveStats.incorrectTags > 0
        ? 'Review false positives'
        : liveStats.targetCount > 0 && liveStats.correctTags === liveStats.targetCount
          ? 'Ready to submit'
          : 'Keep scanning';

      const startGame = () => {
        const testConfig = typeof window !== 'undefined' ? (window.__FIREFLY_SURVEY_TEST__ || {}) : {};
        const generatedBugs = [];
        const randomSite = surveySites[Math.floor(Math.random() * surveySites.length)];
        const nextSite = surveySites.find(site => site.id === testConfig.siteId) || randomSite;
        const types = ['smoky', 'snappy', 'ghost'];
        const nextTargetType = types.includes(testConfig.targetType) ? testConfig.targetType : types[Math.floor(Math.random() * types.length)];
        const testCounts = testConfig.counts || {};
        const countFor = (type, fallback) => {
          const forced = Number(testCounts[type]);
          return Number.isFinite(forced) && forced >= 0 ? Math.floor(forced) : fallback;
        };
        const counts = { 
          smoky: countFor('smoky', Math.floor(Math.random() * 3) + 5),  // 5 to 7
          snappy: countFor('snappy', Math.floor(Math.random() * 4) + 6), // 6 to 9
          ghost: countFor('ghost', Math.floor(Math.random() * 3) + 4)    // 4 to 6
        };
        
        if (Array.isArray(testConfig.bugs) && testConfig.bugs.length) {
          testConfig.bugs.forEach((bug, index) => {
            if (!types.includes(bug.type)) return;
            generatedBugs.push({
              id: bug.id || `${bug.type}-${index}`,
              type: bug.type,
              x: Number.isFinite(Number(bug.x)) ? Number(bug.x) : Math.random() * 90 + 5,
              y: Number.isFinite(Number(bug.y)) ? Number(bug.y) : Math.random() * 70 + 10,
              delay: typeof bug.delay === 'string' ? bug.delay : (bug.type === 'smoky' ? '0s' : `${Math.random() * 4}s`)
            });
          });
        } else {
          Object.keys(counts).forEach(type => {
            for(let i=0; i<counts[type]; i++) {
              generatedBugs.push({
                id: `${type}-${i}`,
                type: type,
                x: Math.random() * 90 + 5,
                y: Math.random() * 70 + 10,
                // Smoky bugs synchronize, so they get the same delay. Others are random.
                delay: type === 'smoky' ? '0s' : `${Math.random() * 4}s`
              });
            }
          });
        }
        
        setBugs(Array.isArray(testConfig.bugs) && testConfig.bugs.length ? generatedBugs : generatedBugs.sort(() => Math.random() - 0.5));
        setTargetType(nextTargetType);
        setSurveySiteId(nextSite.id);
        setTaggedIds([]);
        setTagEvents([{ id: `start-${Date.now()}`, tone: 'info', text: `${nextSite.name} opened: scan slowly, then tag ${bugConfigs[nextTargetType].name}.` }]);
        setResults(null);
        setTimeLeft(60);
        setGameState('playing');
      };

      const handleTag = (id) => {
        if (gameState !== 'playing') return;
        const bug = bugs.find(item => item.id === id);
        if (!bug) return;
        const wasTagged = taggedIds.includes(id);
        const config = bugConfigs[bug.type];
        setTaggedIds(prev => wasTagged ? prev.filter(t => t !== id) : [...prev, id]);
        setTagEvents(prev => [
          {
            id: `${Date.now()}-${id}`,
            tone: bug.type === targetType ? 'match' : 'review',
            text: `${wasTagged ? 'Cleared' : 'Tagged'} ${config.name}: ${bug.type === targetType ? 'matches the target signal' : config.mistakeTip}`
          },
          ...prev
        ].slice(0, 4));
      };

      const handleSubmit = () => {
        const stats = getSurveyStats(taggedIds);

        setResults({
          ...stats,
          siteName: surveySite.name,
          targetName: targetConfig.name
        });
        setGameState('result');
      };

      useEffect(() => {
        if (gameState !== 'playing') return;
        const timer = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(timer);
              setGameState('timeout_trigger'); // Prevent stale closures by triggering a state change instead of direct call
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, [gameState]);

      useEffect(() => {
        if (gameState === 'timeout_trigger') {
          handleSubmit();
        }
      }, [gameState]);

      useEffect(() => {
        onProgress?.({
          value: gameState === 'intro' ? 0 : results ? results.correctTags : liveStats.correctTags,
          total: gameState === 'intro' ? 1 : Math.max(1, liveStats.targetCount),
          label: gameState === 'intro' ? 'Ready to survey' : `${liveStats.correctTags}/${liveStats.targetCount || '?'} targets tagged`,
          nudge: gameState === 'result'
            ? results?.success
              ? 'The field count is clean. Submit the survey badge.'
              : 'Use the precision and recall report to fix the next count.'
            : gameState === 'playing'
              ? `${qualityTone}: tag only ${bugConfigs[targetType].name}s before the timer reaches zero.`
              : 'Start the survey to receive a target flash pattern.',
          steps: [
            { label: 'Study the signal field guide', status: gameState === 'intro' ? 'active' : 'done' },
            { label: 'Watch the target pattern', status: gameState === 'playing' ? 'active' : gameState === 'result' ? 'done' : 'locked' },
            { label: 'Submit a clean field count', status: results?.success ? 'done' : gameState === 'result' ? 'active' : gameState === 'playing' ? 'active' : 'locked' }
          ]
        });
      }, [gameState, bugs.length, targetType, taggedIds.length, liveStats.correctTags, liveStats.targetCount, liveStats.incorrectTags, results?.success, results?.correctTags, qualityTone, onProgress]);

      if (gameState === 'intro') {
        return (
          <div className="flex flex-col gap-6 animate-in zoom-in duration-500 h-full">
            <div className="grid gap-6 lg:grid-cols-[minmax(0,0.95fr)_minmax(0,1.05fr)] lg:items-stretch">
              <div className="relative overflow-hidden rounded-3xl border border-blue-400/30 bg-slate-900 p-6 sm:p-8 shadow-[0_20px_50px_rgba(2,6,23,0.35)]">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_20%_20%,rgba(56,189,248,0.18),transparent_32%),radial-gradient(circle_at_80%_0%,rgba(250,204,21,0.13),transparent_30%)]"></div>
                <div className="relative z-10">
                  <div className="mb-5 inline-flex h-16 w-16 items-center justify-center rounded-2xl border border-blue-300/30 bg-blue-300/10 text-blue-200">
                    <Search size={38} />
                  </div>
                  <h2 className="text-3xl sm:text-4xl font-black mb-3 text-white">Field Survey Lab</h2>
                  <p className="text-slate-300 max-w-xl leading-relaxed">
                    Become the observer behind a real citizen-science dataset: hold a fixed transect, read flash rhythms, and submit a clean species count that a conservation team could trust.
                  </p>
                  <div className="mt-6 grid gap-3 sm:grid-cols-3">
                    {[
                      { label: 'Observe', text: 'Let the night settle before tagging.', icon: Search, color: 'text-blue-300' },
                      { label: 'Identify', text: 'Match rhythm, color, and pause length.', icon: LightbulbOff, color: 'text-yellow-300' },
                      { label: 'Report', text: 'Clean counts beat fast guesses.', icon: CheckCircle, color: 'text-green-300' }
                    ].map(item => {
                      const Icon = item.icon;
                      return (
                        <div key={item.label} className="rounded-2xl border border-slate-700 bg-slate-950/70 p-4">
                          <Icon size={22} className={item.color} />
                          <p className="mt-3 text-sm font-black text-white">{item.label}</p>
                          <p className="mt-1 text-xs leading-relaxed text-slate-400">{item.text}</p>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              <div className="rounded-3xl border border-slate-700 bg-slate-900 p-5 sm:p-6">
                <div className="mb-4 flex items-center justify-between gap-3">
                  <div>
                    <p className="text-xs font-black uppercase tracking-wider text-blue-300">Signal Field Guide</p>
                    <h3 className="text-xl font-black text-white">Practice the patterns before the count</h3>
                  </div>
                  <span className="rounded-full border border-slate-700 bg-slate-950 px-3 py-1 text-[10px] font-black uppercase tracking-wider text-slate-300">60 sec survey</span>
                </div>
                <div className="grid gap-3">
                  {patternCards.map(([type, config]) => (
                    <div key={type} className="grid grid-cols-[auto_minmax(0,1fr)] gap-3 rounded-2xl border border-slate-700 bg-slate-950/70 p-3">
                      <div className="flex h-16 w-16 items-center justify-center rounded-2xl border border-slate-700 bg-slate-900">
                        <SurveyFireflyMarker config={config} delay="0s" tagged={false} className="h-11 w-11" />
                      </div>
                      <div className="min-w-0">
                        <p className="font-black text-white">{config.name}</p>
                        <p className="mt-1 text-xs leading-relaxed text-slate-400">{config.desc}</p>
                        <p className="mt-2 text-xs font-semibold text-cyan-200">{config.fieldClue}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="grid gap-4 lg:grid-cols-3">
              {surveySites.map(site => (
                <div key={site.id} className="rounded-2xl border border-slate-700 bg-slate-900/80 p-4">
                  <p className="text-sm font-black text-white">{site.name}</p>
                  <p className="mt-1 text-xs leading-relaxed text-slate-400">{site.habitat}</p>
                  <p className="mt-3 text-xs font-bold text-yellow-200">{site.method}</p>
                </div>
              ))}
            </div>

            <div className="flex justify-center">
              <button onClick={startGame} className="px-8 py-4 font-black rounded-full transition-all flex items-center gap-2 bg-blue-500 text-white hover:bg-blue-400 shadow-[0_0_20px_rgba(59,130,246,0.6)] text-xl hover:scale-105 active:scale-95">
                Start Field Survey <ArrowRight size={22} />
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'result') {
        const reportStats = results || liveStats;
        return (
          <div className="flex flex-col items-center justify-center gap-5 animate-in zoom-in duration-700 h-full text-center">
            <div className="relative mb-2">
              <div className={`absolute inset-0 blur-3xl opacity-30 rounded-full animate-pulse ${results.success ? 'bg-green-500' : 'bg-red-500'}`}></div>
              {results.success ? (
                <CheckCircle size={100} className="text-green-400 relative z-10 animate-bounce drop-shadow-[0_0_20px_rgba(74,222,128,1)]" />
              ) : (
                <AlertTriangle size={100} className="text-red-500 relative z-10 animate-shake" />
              )}
            </div>
            
            <h2 className={`text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r ${results.success ? 'from-green-400 to-yellow-400' : 'from-orange-400 to-red-400'}`}>
              {results.success ? "Perfect Observation!" : "Data Error!"}
            </h2>
            
            <div className="bg-slate-800/80 border border-slate-700 p-5 sm:p-6 rounded-2xl max-w-4xl shadow-xl w-full">
              <p className="text-lg text-slate-200 mb-6">
                {results.success 
                  ? `Excellent work, researcher! You accurately tagged all ${results.targetCount} ${results.targetName}s at ${results.siteName} without any false positives. Your data is the kind of clean count researchers can compare over time.` 
                  : `Your field data had some errors. Use the report below like a real observer would: check missed targets, false positives, and the flash clue before repeating the transect.`}
              </p>
              
              <div className="grid grid-cols-2 gap-3 text-left sm:grid-cols-4">
                {[
                  ['Target Count', reportStats.targetCount, 'text-white'],
                  ['Correctly Tagged', reportStats.correctTags, 'text-green-400'],
                  ['Missed Targets', reportStats.missedTargets, 'text-orange-400'],
                  ['False Positives', reportStats.incorrectTags, 'text-red-400']
                ].map(([label, value, color]) => (
                  <div key={label} className="bg-slate-900 p-4 rounded-lg border border-slate-700">
                    <span className="text-xs font-bold text-slate-500 uppercase">{label}</span>

    // --- STAGE 8: LIGHT POLLUTION SIMULATOR ---

      const setLightField = useNotebookField(setLightNotebook);

          id: 'urban',

          accent: 'orange',

          rangeClass: 'accent-orange-500',
          aria: 'Urban skyglow intensity',

      const rescueFixes = [

          impact: 18,
          lesson: 'The best light is no light when it is not needed.'
        },
        {
          id: 'shield',
          title: 'Shield Downward',
          icon: ShieldCheck,
          impact: 12,
          lesson: 'Full-cutoff fixtures keep light on paths instead of into meadow air.'

        {

          title: 'Warm Amber Only',

          impact: 9,
          lesson: 'Longer amber or red-filtered light is less confusing than cool white light.'
        },
        {

          icon: Clock,

        }
      ];

      const bugField = [
        { id: 'a', x: 10, y: 24, delay: '0.1s', tolerance: 22 },
        { id: 'b', x: 18, y: 56, delay: '1.3s', tolerance: 34 },
        { id: 'c', x: 26, y: 36, delay: '0.7s', tolerance: 48 },
        { id: 'd', x: 33, y: 68, delay: '2.2s', tolerance: 58 },
        { id: 'e', x: 41, y: 28, delay: '1.8s', tolerance: 65 },
        { id: 'f', x: 49, y: 48, delay: '0.4s', tolerance: 72 },
        { id: 'g', x: 56, y: 66, delay: '2.6s', tolerance: 78 },
        { id: 'h', x: 64, y: 34, delay: '1.1s', tolerance: 82 },
        { id: 'i', x: 72, y: 58, delay: '3.1s', tolerance: 88 },
        { id: 'j', x: 80, y: 27, delay: '0.9s', tolerance: 93 },
        { id: 'k', x: 88, y: 51, delay: '2.8s', tolerance: 96 },

        { id: 'o', x: 84, y: 39, delay: '2.0s', tolerance: 76 }
      ];

      const rawPollution = (urban + cars + flashlights) / 3;
      const mitigation = activeFixIds.reduce((sum, id) => {
        const fix = rescueFixes.find(item => item.id === id);
        return sum + (fix ? fix.impact : 0);
      }, 0);
      const totalPollution = Math.max(0, rawPollution - mitigation);
      const signalClarity = Math.max(0, Math.round(100 - totalPollution * 1.18));
      const activeBugs = bugField.filter(b => b.tolerance > totalPollution);
      const rescuePlanReady = activeFixIds.length >= 2;
      const darkSkyRestored = hasSeenCritical && totalPollution <= 20 && rescuePlanReady;
      const stressLabel = totalPollution < 25
        ? 'Healthy dark sky'

            ? 'Bright town sky'

            { label: 'Raise the light stressors', status: hasSeenCritical ? 'done' : 'active' },

            { label: 'Build a dark-sky rescue plan', status: rescuePlanReady ? 'done' : hasSeenCritical ? 'active' : 'locked' },
            { label: 'Return the night to a safe darkness', status: darkSkyRestored ? 'done' : hasSeenCritical ? 'active' : 'locked' }

              </span>

                Dark sky {darkSkyRestored ? 'restored' : 'pending'}
              </span>
            </div>
          </div>

            {/* Visual Simulator */}
            <div
              className="w-full lg:w-3/5 relative bg-slate-950 rounded-3xl border-4 border-slate-800 overflow-hidden flex flex-col items-center justify-end min-h-[390px] shadow-[inset_0_0_80px_rgba(15,23,42,0.8)]"
              aria-label="Light pollution meadow simulator"
            >
              
              {/* Skyglow (Urban) */}
              <div className="absolute inset-0 bg-orange-500 transition-opacity duration-500 pointer-events-none mix-blend-screen" style={{ opacity: urban / 210 }}></div>
              <div className="absolute bottom-0 inset-x-0 h-2/3 bg-gradient-to-t from-orange-300 via-orange-500/70 to-transparent transition-opacity duration-500" style={{ opacity: urban / 115 }}></div>
              <div className="absolute inset-x-0 top-0 h-1/2 bg-gradient-to-b from-sky-300/20 to-transparent transition-opacity duration-500" style={{ opacity: Math.max(cars, flashlights) / 180 }}></div>

              {/* Stars and moon fade as the sky brightens */}
              <div className="absolute inset-0 transition-opacity duration-500" style={{ opacity: Math.max(0.08, 1 - totalPollution / 95) }}>
                {[12, 19, 27, 39, 53, 61, 74, 86].map((left, index) => (
                  <span
                    key={left}
                    className="absolute h-1 w-1 rounded-full bg-yellow-100 shadow-[0_0_8px_rgba(254,240,138,0.85)]"

    function TriviaIllustration({ visual, feedback, questionIndex }) {
      const VisualIcon = visual.icon;

    function StageTrivia({ onComplete, onSkip, onProgress }) {
      const [gameState, setGameState] = useState('start'); // start, playing, gameover
      const [questionIndex, setQuestionIndex] = useState(0);
      const [roundId, setRoundId] = useState(0);
      const [score, setScore] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [streak, setStreak] = useState(0);
      const triviaGoal = 10;
      const triviaComplete = score >= triviaGoal;
      const previewThemes = ['chemistry', 'geography', 'larva', 'conservation'].map(id => TRIVIA_VISUAL_THEMES.find(theme => theme.id === id)).filter(Boolean);

      // Randomize the 100 questions for each playthrough
      const shuffledQuestions = useMemo(() => {
        let shuffled = [...TRIVIA_DB].sort(() => 0.5 - Math.random());
        return shuffled;
      }, [roundId]);

      const currentQ = shuffledQuestions[questionIndex];
      const currentVisual = getTriviaVisual(currentQ);
      const isLastQuestion = questionIndex >= shuffledQuestions.length - 1;
      const answeredCount = feedback ? questionIndex + 1 : questionIndex;
      const progressPct = Math.min(100, (answeredCount / TRIVIA_DB.length) * 100);

      useEffect(() => {
        onProgress?.({
          value: Math.min(score, triviaGoal),
          total: triviaGoal,
          label: `${Math.min(score, triviaGoal)}/${triviaGoal} correct answers`,
          nudge: triviaComplete
            ? 'You have enough correct answers to claim the Trivia Spark badge.'
            : gameState === 'playing'
              ? feedback
                ? 'Read the explanation, then move to the next fact.'
                : `Question ${questionIndex + 1} is ready. Build toward ten correct answers.`
              : 'Start the arcade to begin collecting correct answers.',
          steps: [
            { label: 'Start the trivia arcade', status: gameState === 'start' ? 'active' : 'done' },
            { label: 'Answer ten questions correctly', status: triviaComplete ? 'done' : gameState === 'playing' ? 'active' : 'locked' },
            { label: 'Continue to the ranger test', status: triviaComplete ? 'active' : 'locked' }
          ]
        });
      }, [score, triviaComplete, gameState, feedback?.correct, questionIndex, onProgress]);

      const handleStart = () => {
        setScore(0);
        setQuestionIndex(0);
        setFeedback(null);
        setStreak(0);
        setRoundId(id => id + 1);
        setGameState('playing');
      };

      const handleAnswer = (selectedIndex) => {
        if (feedback) return; // Prevent double clicks
        
        const isCorrect = selectedIndex === currentQ.a;
        if (isCorrect) {
          setScore(s => s + 1);
          setStreak(s => s + 1);
        } else {
          setStreak(0);
        }

        setFeedback({
          correct: isCorrect,
          text: currentQ.e,
          selected: selectedIndex,
          actual: currentQ.a
        });
      };

      const handleNextQuestion = () => {
        if (!feedback) return;
        setFeedback(null);
        if (isLastQuestion) {
          setGameState('gameover');
        } else {
          setQuestionIndex(qi => qi + 1);
        }
      };

      if (gameState === 'start') {
        return (
          <div className="flex flex-col items-center justify-center space-y-6 animate-in zoom-in duration-500 h-full">
            <div className="text-center shrink-0">
              <HelpCircle size={80} className="text-yellow-400 mx-auto mb-4 animate-bounce" />
              <h2 className="text-4xl font-black mb-2 text-white">100 Fun Facts Arcade</h2>
              <p className="text-slate-300 max-w-2xl mx-auto">Dive into 100 firefly facts with illustrated field-note cards, streak sparks, and answer reveals you can read at your own pace.</p>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 w-full max-w-3xl">
              {previewThemes.map(theme => {
                const PreviewIcon = theme.icon;
                return (
                  <div key={theme.id} className="rounded-2xl border bg-slate-900/80 p-3 text-center shadow-lg" style={{ borderColor: `${theme.accent}55` }}>
                    <PreviewIcon size={24} className="mx-auto mb-2" style={{ color: theme.accent }} />
                    <p className="text-xs font-black text-slate-100 leading-tight">{theme.label}</p>
                  </div>
                );
              })}
            </div>
            <button onClick={handleStart} className="px-8 py-4 font-bold rounded-full transition-all flex items-center gap-2 bg-yellow-400 text-slate-900 hover:bg-yellow-300 shadow-[0_0_20px_rgba(250,204,21,0.6)] text-xl hover:scale-105 active:scale-95">
              Start Trivia Arcade <ArrowRight size={24} />
            </button>
            <button onClick={onSkip} className="mt-4 text-slate-400 hover:text-white underline text-sm">Skip Trivia and proceed without Badge</button>
          </div>
        );
      }

      if (gameState === 'gameover') {
        return (
          <div className="flex flex-col items-center justify-center space-y-6 animate-in zoom-in duration-500 h-full text-center">
            <Award size={80} className="text-yellow-400 mx-auto mb-4" />
            <h2 className="text-4xl font-black text-white">Trivia Master!</h2>
            <p className="text-xl text-slate-300">You answered {score} out of {TRIVIA_DB.length} questions correctly!</p>
            <div className="flex gap-4 mt-6">
              <button onClick={handleStart} className="px-6 py-3 rounded-full font-bold bg-slate-800 text-white hover:bg-slate-700 flex items-center gap-2"><RefreshCw size={18}/> Play Again</button>
              {score >= triviaGoal && (
                <button onClick={onComplete} className="px-6 py-3 rounded-full font-bold bg-yellow-400 text-slate-900 hover:bg-yellow-300 flex items-center gap-2">Final Exam <ArrowRight size={18}/></button>
              )}
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col items-center justify-center space-y-5 animate-in slide-in-from-right duration-500 h-full">
          <div className="w-full max-w-5xl flex justify-between items-end mb-1 shrink-0">
            <div>
              <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Question {questionIndex + 1}/{TRIVIA_DB.length}</span>
              <div className="text-lg font-black text-white">Score: <span className="text-yellow-400">{score}</span></div>
            </div>
            <div className="flex items-center gap-2 bg-slate-900 px-4 py-1.5 rounded-full border border-slate-800">
              <Flame className={streak >= 3 ? "text-orange-500 animate-pulse" : "text-slate-600"} size={18} />
              <span className="font-bold text-sm text-slate-300">Streak: {streak}</span>
            </div>
          </div>

          <div className="w-full max-w-5xl h-2 bg-slate-800 rounded-full shrink-0 overflow-hidden">
            <div className="h-full bg-gradient-to-r from-yellow-400 via-pink-400 to-cyan-300 transition-all duration-500" style={{width: `${progressPct}%`}}></div>
          </div>

    // --- STAGE 10: CONSERVATION RANGER TEST ---

        setFeedback(null);

        setPhase('pledge');
