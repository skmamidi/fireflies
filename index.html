      { q: "Did Native Americans use fireflies?", o: ["Yes, sometimes in gourds as lanterns or decoration", "No, they feared them", "They used them as currency", "They ate them"], a: 0, e: "Historical accounts suggest some tribes used them for temporary light or adornment." },
      { q: "In the 1800s, what did people think caused the glow?", o: ["Electricity", "Phosphorus (hence 'phosphorescence')", "Magic", "Friction"], a: 1, e: "Early scientists mistakenly believed it was phosphorus, before discovering luciferin." },
      { q: "How long is the US firefly viewing season?", o: ["All year", "Only in winter", "Typically a few weeks from May to July", "One single night"], a: 2, e: "The adult mating season is a brief window in early to mid-summer." },
      { q: "What is a 'Luminescence'?", o: ["Emission of light not caused by high heat", "Burning wood", "Reflecting the sun", "A type of bug"], a: 0, e: "It's cold light emission, opposite of incandescence (light from heat)." },
      { q: "How do fireflies breathe?", o: ["Through a nose", "Through gills", "Through tubes called tracheae on their sides", "Through their mouth"], a: 2, e: "Insects breathe through tiny holes called spiracles connected to tracheal tubes." },
      { q: "Does the oxygen for the glow enter through their lungs?", o: ["Yes", "They don't have lungs; it enters via tracheoles directly to the lantern", "Through the blood", "Through the skin"], a: 1, e: "Insects lack lungs; oxygen is piped directly to the light-producing cells." },
      { q: "Can fireflies control their own flash?", o: ["No, it's automatic", "Yes, it is controlled by their nervous system", "The wind controls it", "Only females can"], a: 1, e: "Their brain controls the exact timing of the oxygen release into the lantern." },
      { q: "What does 'Entomotourism' mean?", o: ["Traveling to see plants", "Traveling specifically to view insect phenomena", "Traveling to eat bugs", "Traveling by train"], a: 1, e: "It's a booming industry of ecotourism focused on insects like fireflies and butterflies." },
      { q: "Why is Congaree National Park's lottery necessary?", o: ["To make money", "To protect the habitat from being crushed by thousands of tourists", "To keep bugs in", "To feed the bugs"], a: 1, e: "Massive crowds physically destroyed the leaf litter before the lottery was instituted." },
      { q: "What is the 'Pennsylvania Firefly Festival'?", o: ["A music concert only", "An annual event celebrating and protecting P. carolinus in the Allegheny Forest", "A cooking show", "A winter sport"], a: 1, e: "It's a major entomotourism and conservation event in PA." },
      { q: "Do synchronous fireflies exist in Mexico?", o: ["No", "Yes, massive displays happen in Tlaxcala", "Only in zoos", "Only on the beach"], a: 1, e: "The Nanacamilpa forests in Tlaxcala host incredible synchronous displays." },
      { q: "Are fireflies territorial?", o: ["Yes, they fight fiercely", "No, males generally ignore each other while searching for females", "Only the females are", "Only in water"], a: 1, e: "They don't fight over territory; the competition is purely visual signaling." },
      { q: "What happens if you catch a firefly in a jar with no air holes?", o: ["It glows brighter", "It will suffocate and die", "It turns blue", "It falls asleep"], a: 1, e: "They need oxygen to breathe and to glow!" },
      { q: "Why shouldn't you poke holes in a metal jar lid from the inside out?", o: ["It looks bad", "The sharp edges inside can cut the firefly's wings", "It lets too much air in", "It stops the glow"], a: 1, e: "Always punch holes from the outside in to keep the inside smooth for the bugs." },
      { q: "How long should you keep a caught firefly?", o: ["Forever", "A week", "Only a few hours, then release it at night so it can mate", "Until winter"], a: 2, e: "Their adult life is very short; keeping them prevents them from reproducing." },
      { q: "What family do fireflies belong to?", o: ["Formicidae", "Lampyridae", "Lepidoptera", "Apidae"], a: 1, e: "Lampyridae is the scientific family of fireflies." },
      { q: "Are there any aquatic fireflies in the US?", o: ["Yes, millions", "No, US larvae are strictly terrestrial/semi-aquatic in soil", "Only in oceans", "Only in Texas"], a: 1, e: "Unlike Japan's Genji, US fireflies don't have fully underwater larvae." },
      { q: "Do fireflies migrate south for the winter?", o: ["Yes, like birds", "No, they hibernate in the soil as larvae", "They fly to space", "They ride on deer"], a: 1, e: "Larvae burrow deeper into the soil to survive the freezing winter." },
      { q: "What is a 'Lek'?", o: ["A puddle", "A gathering of males displaying to females", "A type of tree", "A predator"], a: 1, e: "It's a biological term for a competitive mating display ground." },
      { q: "Can urban sky-glow affect fireflies miles away?", o: ["No", "Yes, ambient light bounces off clouds and ruins dark forests", "Only if it's red light", "Only in winter"], a: 1, e: "Sky-glow from cities raises ambient light levels, suppressing flashing behavior." },
      { q: "What happens to the Femme Fatale after she eats a male?", o: ["She dies", "She absorbs his toxic Lucibufagins to protect her own eggs", "She turns blue", "She stops glowing"], a: 1, e: "She steals his chemical defenses to make herself and her eggs poisonous to predators!" },
      { q: "Are firefly numbers increasing or decreasing globally?", o: ["Increasing rapidly", "Decreasing significantly", "Staying exactly the same", "They are extinct"], a: 1, e: "Due to habitat loss and light pollution, they are declining worldwide." },
      { q: "What is the best thing to plant for fireflies?", o: ["Short grass", "Native trees, shrubs, and leaving leaf litter", "Plastic flowers", "Cactus"], a: 1, e: "Native plants and un-raked leaves provide the perfect humid habitat." },
      { q: "What is 'citizen science'?", o: ["Science done by politicians", "Everyday people collecting data (like counting fireflies) to help researchers", "Science in cities only", "Fake science"], a: 1, e: "Programs rely on regular citizens to map where fireflies still live." },
      { q: "Do all synchronous fireflies have dark pauses?", o: ["Yes", "No, the Snappy Sync flashes continuously without long pauses", "Only in Japan", "Only in caves"], a: 1, e: "While P. carolinus has a dark pause, P. frontalis just keeps flashing rapidly." },
      { q: "What does the enzyme Luciferase do?", o: ["Creates oxygen", "Acts as a catalyst to speed up the light reaction", "Digests food", "Pumps blood"], a: 1, e: "Enzymes are biological catalysts that make chemical reactions happen faster." },
      { q: "Can fireflies hear?", o: ["Yes, they have big ears", "No, they lack tympanal organs (ears)", "They hear with their antennae", "They hear via radio"], a: 1, e: "They are deaf! Their communication is entirely visual and chemical." }
    ];

    function StageTrivia({ onComplete }) {
      const [gameState, setGameState] = useState('start'); // start, playing, gameover
      const [questionIndex, setQuestionIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [streak, setStreak] = useState(0);

      // Randomize the 100 questions for each playthrough
      const shuffledQuestions = useMemo(() => {
        let shuffled = [...TRIVIA_DB].sort(() => 0.5 - Math.random());
        return shuffled;
      }, [gameState === 'start']);

      const currentQ = shuffledQuestions[questionIndex];

      const handleStart = () => {
        setScore(0);
        setQuestionIndex(0);
        setStreak(0);
        setGameState('playing');
      };

      const handleAnswer = (selectedIndex) => {
        if (feedback) return; // Prevent double clicks
        
        const isCorrect = selectedIndex === currentQ.a;
        if (isCorrect) {
          setScore(s => s + 1);
          setStreak(s => s + 1);
        } else {
          setStreak(0);
        }

        setFeedback({
          correct: isCorrect,
          text: currentQ.e,
          selected: selectedIndex,
          actual: currentQ.a
        });

        setTimeout(() => {
          setFeedback(null);
          if (questionIndex < 99) { // Go through all 100 or until user quits
            setQuestionIndex(qi => qi + 1);
          } else {
            setGameState('gameover');
          }
        }, 4000);
      };

      if (gameState === 'start') {
        return (
          <div className="flex flex-col items-center justify-center space-y-6 animate-in zoom-in duration-500 h-full">
            <div className="text-center shrink-0">
              <HelpCircle size={80} className="text-yellow-400 mx-auto mb-4 animate-bounce" />
              <h2 className="text-4xl font-black mb-2 text-white">100 Fun Facts Arcade</h2>
              <p className="text-slate-300 max-w-lg mx-auto">Dive into our massive database of 100 firefly facts. Answer questions to build your streak and learn incredible trivia about biology, global species, and history!</p>
            </div>
            <button onClick={handleStart} className="px-8 py-4 font-bold rounded-full transition-all flex items-center gap-2 bg-yellow-400 text-slate-900 hover:bg-yellow-300 shadow-[0_0_20px_rgba(250,204,21,0.6)] text-xl hover:scale-105 active:scale-95">
              Start Trivia Arcade <ArrowRight size={24} />
            </button>
            <button onClick={onComplete} className="mt-4 text-slate-400 hover:text-white underline text-sm">Skip Trivia and proceed to Final Exam</button>
          </div>
        );
      }

      if (gameState === 'gameover') {
        return (
          <div className="flex flex-col items-center justify-center space-y-6 animate-in zoom-in duration-500 h-full text-center">
            <Award size={80} className="text-yellow-400 mx-auto mb-4" />
            <h2 className="text-4xl font-black text-white">Trivia Master!</h2>
            <p className="text-xl text-slate-300">You answered {score} out of 100 questions correctly!</p>
            <div className="flex gap-4 mt-6">
              <button onClick={handleStart} className="px-6 py-3 rounded-full font-bold bg-slate-800 text-white hover:bg-slate-700 flex items-center gap-2"><RefreshCw size={18}/> Play Again</button>
              <button onClick={onComplete} className="px-6 py-3 rounded-full font-bold bg-yellow-400 text-slate-900 hover:bg-yellow-300 flex items-center gap-2">Final Exam <ArrowRight size={18}/></button>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col items-center justify-center space-y-6 animate-in slide-in-from-right duration-500 h-full">
          <div className="w-full max-w-3xl flex justify-between items-end mb-2 shrink-0">
            <div>
              <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Question {questionIndex + 1}/100</span>
              <div className="text-lg font-black text-white">Score: <span className="text-yellow-400">{score}</span></div>
            </div>
            <div className="flex items-center gap-2 bg-slate-900 px-4 py-1.5 rounded-full border border-slate-800">
              <Flame className={streak >= 3 ? "text-orange-500 animate-pulse" : "text-slate-600"} size={18} />
              <span className="font-bold text-sm text-slate-300">Streak: {streak}</span>
            </div>
          </div>

          <div className="w-full max-w-3xl h-1 bg-slate-800 rounded-full shrink-0 overflow-hidden">
            <div className="h-full bg-yellow-400 transition-all duration-300" style={{width: `${(questionIndex / 100) * 100}%`}}></div>
          </div>

          <div className="w-full max-w-3xl text-center shrink-0">
            <h2 className="text-xl sm:text-2xl lg:text-3xl font-black mb-4 text-white leading-relaxed">{currentQ.q}</h2>
          </div>

          {feedback ? (
            <div className={`p-6 sm:p-8 rounded-3xl w-full max-w-3xl border-4 text-center animate-in zoom-in duration-300 shrink-0 ${feedback.correct ? 'bg-green-900/50 border-green-500' : 'bg-red-900/50 border-red-500'}`}>
              <div className="flex justify-center mb-4">
                {feedback.correct ? <CheckCircle size={56} className="text-green-400 animate-bounce" /> : <AlertTriangle size={56} className="text-red-400 animate-shake" />}
              </div>
              <h3 className={`text-xl sm:text-2xl font-bold mb-3 ${feedback.correct ? 'text-green-400' : 'text-red-400'}`}>
                {feedback.correct ? 'Correct!' : 'Incorrect!'}
              </h3>
              <p className="text-base sm:text-lg text-slate-200 leading-relaxed bg-slate-950/30 p-4 rounded-xl inline-block">{feedback.text}</p>
            </div>
          ) : (
            <div className="w-full max-w-3xl flex flex-col gap-3 sm:gap-4 flex-1 overflow-y-auto custom-scrollbar pr-2 min-h-[250px]">
              {currentQ.o.map((opt, idx) => (
                <button
                  key={idx}
                  onClick={() => handleAnswer(idx)}
                  className="p-4 sm:p-5 text-left rounded-2xl bg-slate-800 border-2 border-slate-700 hover:border-yellow-400 hover:bg-slate-700 transition-all font-medium text-base sm:text-lg text-slate-200 shadow-sm hover:shadow-[0_0_15px_rgba(250,204,21,0.2)] hover:-translate-y-1 shrink-0"
                >
                  {opt}
                </button>
              ))}
            </div>
          )}

          <div className="flex justify-between w-full max-w-3xl shrink-0 pt-2">
             <button onClick={onComplete} className="text-xs text-slate-500 hover:text-white transition-colors underline">End Trivia Early</button>
          </div>
        </div>
      );
    }

    // --- STAGE 10: CONSERVATION QUIZ (Advanced for Teens/YA) ---
    function StageConservation({ badges, addBadge }) {
      const [currentQ, setCurrentQ] = useState(0);
      const [score, setScore] = useState(0);
      const [finished, setFinished] = useState(false);
      const [feedback, setFeedback] = useState(null);

      const questions = [
        { title: "Why is the bioluminescent reaction of fireflies referred to scientifically as 'cold light'?", options: [{ text: "It only happens in cold climates.", correct: false, explain: "Incorrect. Many species thrive in humid swamps!" }, { text: "It produces virtually zero thermal energy.", correct: true, explain: "Correct! The rapid oxidation of luciferin is nearly 100% efficient, generating light without burning up the insect." }] },
        { title: "What evolutionary problem does synchronous flashing solve in dense forests?", options: [{ text: "It cuts through ambient 'signal noise' allowing females to identify mates.", correct: true, explain: "Correct! By flashing in unison, males make their specific 'code' visible over the visual clutter." }, { text: "It blinds predators like bats temporarily.", correct: false, explain: "Incorrect. Synchrony is primarily for courtship communication." }] },
        { title: "How does the 'Femme Fatale' (Photuris versicolor) firefly utilize bioluminescence?", options: [{ text: "She mimics flash patterns of other species to lure in males and consume them.", correct: true, explain: "Correct! This is a fascinating example of predatory deception." }, { text: "She emits a continuous blue glow to scare away predators.", correct: false, explain: "Incorrect. That continuous glow belongs to the Blue Ghost." }] },
        { title: "Fireflies spend up to two years as larvae. What is their primary ecological role?", options: [{ text: "They are ravenous terrestrial carnivores that hunt snails and slugs.", correct: true, explain: "Correct! They actively hunt soft-bodied invertebrates in the moist soil." }, { text: "They act as pollinators for forest flowers.", correct: false, explain: "Incorrect! They don't pollinate; they are predators." }] },
        { title: "Why do conservationists heavily promote the 'Leave the Leaves' campaign?", options: [{ text: "Because manicured lawns destroy the moist habitat needed for gestating larvae.", correct: true, explain: "Correct! Un-raked leaf litter is absolutely vital for the survival of the next generation." }, { text: "Because decaying leaves produce the luciferin chemical the adults need.", correct: false, explain: "Incorrect. Luciferin is produced internally." }] }
      ];

      const handleAnswer = (isCorrect, explanation) => {
        if (feedback) return;
        setFeedback({ correct: isCorrect, text: explanation });
        if (isCorrect) setScore(score + 1);
        
        setTimeout(() => {
          setFeedback(null);
          if (currentQ < questions.length - 1) {
            setCurrentQ(currentQ + 1);
          } else {
            setFinished(true);
            if (score + (isCorrect ? 1 : 0) >= 4) addBadge('Master Ranger');
          }
        }, 4000);
      };

      if (finished) {
        const passed = score >= 4;
        return (
          <div className="flex-1 flex flex-col items-center justify-center text-center animate-in zoom-in duration-700">
            <div className="relative mb-6">
              <div className={`absolute inset-0 blur-3xl opacity-30 rounded-full animate-pulse ${passed ? 'bg-green-500' : 'bg-orange-500'}`}></div>
              {passed ? <Award size={100} className="text-yellow-400 relative z-10 animate-bounce drop-shadow-[0_0_20px_rgba(250,204,21,1)]" /> : <LightbulbOff size={100} className="text-slate-500 relative z-10" />}
            </div>
            <h2 className={`text-4xl sm:text-5xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r ${passed ? 'from-green-400 to-yellow-400' : 'from-orange-400 to-red-400'}`}>
              {passed ? 'Senior Conservation Expert!' : 'Keep Studying, Ranger!'}
            </h2>
            <p className="text-lg text-slate-300 max-w-lg mb-6">
              Evaluation complete! You scored <strong>{score} out of {questions.length}</strong>. 
              {passed ? " You possess the advanced scientific knowledge required to protect these complex habitats." : " You need a score of 4 or higher to earn your Master Ranger badge."}
            </p>
            <button onClick={() => passed ? window.location.reload() : (() => { setCurrentQ(0); setScore(0); setFinished(false); })()} className="mt-6 px-8 py-3 rounded-full font-bold text-slate-900 bg-yellow-400 hover:bg-yellow-300 transition-colors shadow-[0_0_15px_rgba(250,204,21,0.5)]">
              {passed ? 'Restart Expedition' : 'Retake Exam'}
            </button>
          </div>
        );
      }

      const q = questions[currentQ];

      return (
        <div className="flex flex-col items-center justify-center space-y-6 animate-in slide-in-from-right duration-500 h-full">
          <div className="text-center w-full max-w-3xl shrink-0">
            <div className="flex justify-center mb-4 text-yellow-500 gap-2">
              {[...Array(questions.length)].map((_, i) => (
                 <div key={i} className={`h-2 flex-1 rounded-full ${i <= currentQ ? 'bg-yellow-400' : 'bg-slate-800'}`}></div>
              ))}
            </div>
            <div className="flex items-center justify-center gap-3 mb-2">
              <span className="bg-slate-800 text-slate-400 text-xs font-bold px-3 py-1 rounded-full border border-slate-700">Exam Question {currentQ + 1} of {questions.length}</span>
            </div>
            <h2 className="text-xl sm:text-2xl font-black mb-6 text-white leading-relaxed">{q.title}</h2>
          </div>

          {feedback ? (
            <div className={`p-6 sm:p-8 rounded-3xl w-full max-w-3xl border-4 text-center animate-in zoom-in duration-300 shrink-0 ${feedback.correct ? 'bg-green-900/50 border-green-500' : 'bg-red-900/50 border-red-500'}`}>
              <div className="flex justify-center mb-4">
                {feedback.correct ? <CheckCircle size={56} className="text-green-400 animate-bounce" /> : <AlertTriangle size={56} className="text-red-400 animate-shake" />}
              </div>
              <h3 className={`text-xl sm:text-2xl font-bold mb-3 ${feedback.correct ? 'text-green-400' : 'text-red-400'}`}>{feedback.correct ? 'Scientifically Accurate!' : 'Incorrect Hypothesis.'}</h3>
              <p className="text-base sm:text-lg text-slate-200 leading-relaxed bg-slate-950/30 p-4 rounded-xl inline-block">{feedback.text}</p>
            </div>
          ) : (
            <div className="w-full max-w-3xl flex flex-col gap-4 flex-1 overflow-y-auto custom-scrollbar pr-2 min-h-0">
              {q.options.map((opt, idx) => (
                <button key={idx} onClick={() => handleAnswer(opt.correct, opt.explain)} className="p-5 sm:p-6 text-left rounded-2xl bg-slate-800 border-2 border-slate-700 hover:border-yellow-400 hover:bg-slate-700 transition-all font-medium text-lg text-slate-200 shadow-sm hover:shadow-[0_0_15px_rgba(250,204,21,0.2)] hover:-translate-y-1 shrink-0">
                  {opt.text}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Initialize the React application directly onto the DOM
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
