        const shareData = {
          title: `Master Ranger Certificate for ${displayName}`,
          text: certificateShareText,
          url: window.location.href
        };

          if (navigator.share) {
            await navigator.share(shareData);
            setShareStatus('Certificate ready to share.');
            return;
          }
        } catch (error) {
          if (error?.name === 'AbortError') return;
        }

        try {
          if (!navigator.clipboard?.writeText) throw new Error('Clipboard unavailable');
          await navigator.clipboard.writeText(`${shareData.text}\n${shareData.url}`);
          setShareStatus('Certificate summary copied.');

          setShareStatus('Share is not available in this browser.');

                ? passed
                  ? canTakePledge
                    ? 'You passed the test. Take the pledge to finish.'
                    : `You passed the test. Earn ${pledgeBadgeShortfall} more ${badgeWord(pledgeBadgeShortfall)} before the Junior Ranger pledge unlocks.`
                  : 'Retake the test and aim for four strong choices.'
                : phase === 'quiz'
                  ? feedback ? 'Read the ranger lesson, then continue to the next mission.' : 'Choose the action that protects habitat first.'
                  : 'Start the final ranger test when you are ready.',

            { label: 'Start the ranger test', status: phase === 'briefing' ? 'active' : 'done' },
            { label: 'Choose the best rescue actions', status: passed ? 'done' : phase === 'quiz' || phase === 'result' ? 'active' : 'locked' },
            { label: `Log ${PLEDGE_BADGE_REQUIREMENT} badges`, status: canTakePledge ? 'done' : passed && phase === 'result' ? 'active' : 'locked' },
            { label: 'Take the Firefly Ranger pledge', status: phase === 'complete' ? 'done' : passed && canTakePledge ? 'active' : 'locked' }
          ]
        });
      }, [phase, score, passed, pledgedLines.length, feedback?.correct, rangerName, canTakePledge, pledgeBadgeProgress, pledgeBadgeStatus, pledgeBadgeShortfall, onProgress]);

                      <span className={`font-bold leading-relaxed ${checked ? 'text-green-100' : 'text-slate-200'}`}>{line}</span>
                    </button>
                  );
                })}
              </div>

              <div className="bg-slate-900 border border-slate-700 rounded-3xl p-5">
                <label className="block text-xs font-black uppercase tracking-wider text-slate-400 mb-2" htmlFor="ranger-name">Ranger name</label>
                <input
                  id="ranger-name"
                  value={rangerName}
                  onChange={(event) => setRangerName(event.target.value)}
                  maxLength={24}
                  placeholder="Type your first name"
                  className="w-full rounded-2xl border-2 border-slate-700 bg-slate-950 px-4 py-3 text-lg font-black text-white outline-none transition-all focus:border-yellow-300"
                />
                <button
                  onClick={completePledge}
                  disabled={!pledgeReady}
                  className={`mt-4 w-full px-6 py-4 rounded-2xl font-black flex items-center justify-center gap-2 transition-all ${pledgeReady ? 'bg-yellow-400 text-slate-900 hover:bg-yellow-300 shadow-[0_0_18px_rgba(250,204,21,0.55)]' : 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700'}`}
                >
                  I Pledge to Protect Fireflies <Award size={20} />
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (phase === 'complete') {
        return (
          <div className="printable-ranger-award flex-1 flex flex-col items-center justify-center gap-5 animate-in zoom-in duration-700">
            <section
              className="ranger-certificate-card relative w-full max-w-5xl overflow-hidden rounded-3xl border border-yellow-300/35 p-5 text-left shadow-[0_0_55px_rgba(250,204,21,0.2)] sm:p-8"
              aria-label="Printable Master Ranger certificate"
            >
              <div className="relative z-10 grid gap-6 lg:grid-cols-[1.1fr_0.9fr] lg:items-stretch">
                <div className="flex flex-col justify-between rounded-3xl border border-yellow-300/25 bg-slate-950/55 p-5 sm:p-7">
                  <div>
                    <div className="mb-5 inline-flex items-center gap-2 rounded-full border border-green-300/35 bg-green-300/10 px-3 py-1 text-[10px] font-black uppercase tracking-wider text-green-100">
                      <CheckCircle size={13} /> Certified Firefly Ranger
                    </div>
                    <p className="text-sm font-black uppercase tracking-[0.22em] text-yellow-200">Global Firefly Academy</p>
                    <h2 className="mt-2 text-3xl font-black leading-tight text-white sm:text-5xl">Master Ranger Certificate</h2>
                    <p className="mt-5 text-sm font-semibold uppercase tracking-wider text-slate-400">This certifies that</p>
                    <h3 className="mt-2 break-words text-4xl font-black leading-tight text-yellow-200 sm:text-6xl">{displayName}</h3>
                    <p className="mt-5 max-w-2xl text-base font-semibold leading-relaxed text-slate-200 sm:text-lg">
                      completed the Firefly Ranger pledge, made evidence-based conservation choices, and is ready to help protect dark, damp, living habitat.
                    </p>
                  </div>

                  <div className="mt-8 grid gap-3 sm:grid-cols-3">
                    {[
                      ['Ranger Score', `${score}/${questions.length}`],
                      ['Pledge Promises', `${pledgedLines.length}/${pledgeLines.length}`],
                      ['Badges Logged', badgeProgressLabel]
                    ].map(([label, value]) => (
                      <div key={label} className="rounded-2xl border border-slate-700 bg-slate-900/80 px-4 py-3">
                        <p className="text-[10px] font-black uppercase tracking-wider text-slate-500">{label}</p>
                        <p className="mt-1 text-2xl font-black text-yellow-200">{value}</p>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="flex flex-col gap-4">
                  <div className="relative min-h-[17rem] overflow-hidden rounded-3xl border border-green-300/25 bg-slate-950/50 p-5">
                    <div className="absolute inset-0 twinkle-bg opacity-55"></div>
                    <div className="relative z-10 flex h-full flex-col items-center justify-center text-center">
                      <div className="relative mb-5">
                        <div className="absolute inset-0 rounded-full bg-yellow-300/35 blur-3xl"></div>
                        <Award size={112} className="relative z-10 text-yellow-300 drop-shadow-[0_0_24px_rgba(250,204,21,0.95)]" />
                      </div>
                      <p className="text-xs font-black uppercase tracking-[0.22em] text-green-200">Master Ranger Badge</p>
                      <p className="mt-2 text-2xl font-black text-white">Habitat first. Lights gentle. Notes careful.</p>
                    </div>
                  </div>

                  <div className="rounded-3xl border border-slate-700 bg-slate-900/75 p-5">
                    <p className="text-[10px] font-black uppercase tracking-wider text-slate-500">Passport Summary</p>
                    <div className="mt-3 grid gap-3 sm:grid-cols-2">
                      <div className="rounded-2xl border border-slate-800 bg-slate-950/70 p-4">
                        <p className="text-sm font-black text-white">Saved notebook entries</p>
                        <p className="mt-1 text-3xl font-black text-cyan-200">{savedCount}</p>
                      </div>
                      <div className="rounded-2xl border border-slate-800 bg-slate-950/70 p-4">
                        <p className="text-sm font-black text-white">Ranger tools earned</p>
                        <p className="mt-1 text-3xl font-black text-green-200">{earnedTools.length}</p>
                      </div>
                    </div>
                    <div className="mt-4 rounded-2xl border border-yellow-300/20 bg-yellow-300/10 p-4">
                      <p className="text-sm font-bold leading-relaxed text-yellow-50">
                        Science takeaway: firefly conservation works best when people protect darkness, leaf litter, damp soil, native plants, and gentle observation.
                      </p>
                    </div>
                  </div>

                  <div className="grid gap-3 rounded-3xl border border-slate-700 bg-slate-950/50 p-5 sm:grid-cols-2">
                    <div>
                      <p className="text-[10px] font-black uppercase tracking-wider text-slate-500">Issued</p>
                      <p className="mt-1 text-lg font-black text-white">{certificateDate}</p>
                    </div>
                    <div>
                      <p className="text-[10px] font-black uppercase tracking-wider text-slate-500">Academy Signature</p>
                      <p className="mt-1 text-lg font-black text-yellow-200">Global Firefly Academy</p>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <div className="no-print flex w-full max-w-5xl flex-col gap-3 rounded-3xl border border-slate-800 bg-slate-900/80 p-4 shadow-xl sm:flex-row sm:items-center sm:justify-between">
              <div className="min-w-0 text-center sm:text-left">
                <p className="text-sm font-black text-white">Certificate unlocked for {displayName}</p>
                <p className="mt-1 text-xs font-semibold text-slate-400">Print opens your browser dialog, where you can also save as PDF.</p>
                {shareStatus && <p className="mt-2 text-xs font-black text-cyan-200">{shareStatus}</p>}
              </div>
              <div className="flex flex-col gap-2 sm:flex-row">
                <button
                  type="button"
                  onClick={handlePrintCertificate}
                  className="inline-flex min-h-[2.75rem] items-center justify-center gap-2 rounded-full bg-yellow-300 px-5 py-2.5 text-sm font-black text-slate-950 shadow-[0_0_18px_rgba(250,204,21,0.28)] transition-all hover:bg-yellow-200 active:scale-95"
                >
                  Print / Save PDF <Printer size={16} />
                </button>
                <button
                  type="button"
                  onClick={handleShareCertificate}
                  className="inline-flex min-h-[2.75rem] items-center justify-center gap-2 rounded-full border border-cyan-300/35 bg-cyan-300/10 px-5 py-2.5 text-sm font-black text-cyan-100 transition-all hover:border-cyan-300/65 hover:bg-cyan-300/15 active:scale-95"
                >
                  Share Certificate <Share2 size={16} />
                </button>
                <button
                  type="button"
                  onClick={() => onOpenPassport?.()}
                  className="inline-flex min-h-[2.75rem] items-center justify-center gap-2 rounded-full border border-slate-700 bg-slate-950 px-5 py-2.5 text-sm font-black text-slate-100 transition-all hover:border-yellow-300/60 hover:bg-slate-800 active:scale-95"
                >
                  Open Passport <FileText size={16} />
                </button>
                <button
                  type="button"
                  onClick={onRestart}
                  className="inline-flex min-h-[2.75rem] items-center justify-center gap-2 rounded-full border border-slate-700 bg-slate-800 px-5 py-2.5 text-sm font-black text-slate-100 transition-all hover:bg-slate-700 active:scale-95"
                >
                  Restart <RefreshCw size={16} />
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col h-full animate-in slide-in-from-right duration-500 min-h-0">
          <div className="text-center w-full max-w-4xl mx-auto shrink-0 mb-5">
            <div className="flex justify-center mb-4 text-yellow-500 gap-2" aria-label={`Question ${currentQ + 1} of ${questions.length}`}>
              {[...Array(questions.length)].map((_, i) => (
                 <div key={i} className={`h-2 flex-1 rounded-full transition-all ${i < currentQ ? 'bg-green-400' : i === currentQ ? 'bg-yellow-400' : 'bg-slate-800'}`}></div>
              ))}
            </div>
            <div className="flex items-center justify-center gap-3 mb-2">
              <span className="bg-slate-800 text-slate-300 text-xs font-bold px-3 py-1 rounded-full border border-slate-700">Ranger Choice {currentQ + 1} of {questions.length}</span>
              <span className="bg-green-950 text-green-200 text-xs font-bold px-3 py-1 rounded-full border border-green-800">Score {score}/{questions.length}</span>
            </div>
            <h2 className="text-2xl sm:text-3xl font-black text-white leading-relaxed">{q.title}</h2>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-[0.9fr_1.1fr] gap-5 flex-1 min-h-0">
            <div className="relative min-h-[360px] rounded-3xl border-2 border-slate-800 bg-slate-950 overflow-hidden shadow-[inset_0_0_80px_rgba(34,197,94,0.08)]">
              <div className={`absolute inset-0 transition-all duration-500 ${feedback && !feedback.correct ? 'bg-gradient-to-b from-slate-950 via-red-950/40 to-green-950' : 'bg-gradient-to-b from-slate-950 via-blue-950/50 to-green-950'}`}></div>
              <div className="absolute inset-0 twinkle-bg opacity-50"></div>
              <div className="absolute top-8 right-10 h-16 w-16 rounded-full bg-yellow-100 shadow-[0_0_38px_rgba(254,249,195,0.75)]"></div>
              <div className={`absolute top-10 right-7 h-16 w-16 rounded-full transition-colors ${score >= 2 ? 'bg-slate-950' : 'bg-slate-800'}`}></div>
              <div className="absolute bottom-0 left-0 right-0 h-28 bg-gradient-to-t from-green-900 to-green-900/20"></div>
              <div className="absolute bottom-16 left-6 right-6 flex items-end justify-around">
                {[...Array(12)].map((_, i) => (
                  <Sprout key={i} size={18 + (i % 3) * 7} className={habitatHealth >= 70 ? 'text-lime-300' : 'text-green-700'} style={{ transform: `translateY(${(i % 4) * 6}px)` }} />
                ))}
              </div>
              {[...Array(Math.max(5, score * 4 + 5))].map((_, i) => (
                <div
                  key={i}
                  className={`absolute h-2 w-2 rounded-full ${feedback && !feedback.correct ? 'bg-yellow-300/35' : 'bg-yellow-300'} animate-smoky shadow-[0_0_16px_rgba(250,204,21,0.8)]`}
                  style={{ left: `${12 + ((i * 19) % 78)}%`, top: `${20 + ((i * 17) % 52)}%`, animationDelay: `${i * 0.24}s` }}
                ></div>
              ))}
              {feedback && !feedback.correct && (
                <div className="absolute left-7 top-8 rounded-2xl bg-red-950/85 border border-red-500 px-4 py-3 text-red-200 font-black text-sm flex items-center gap-2 animate-pulse">
                  <AlertTriangle size={18} /> Try the ranger lesson
                </div>
              )}
              {feedback?.correct && (
                <div className="absolute left-7 top-8 rounded-2xl bg-green-950/85 border border-green-400 px-4 py-3 text-green-100 font-black text-sm flex items-center gap-2">
                  <CheckCircle size={18} /> Tool earned
                </div>
              )}
              <div className="absolute left-5 right-5 bottom-5 rounded-3xl bg-slate-900/90 border border-slate-700 p-5 backdrop-blur-md">
                <p className="text-xs font-black uppercase tracking-wider text-slate-400">Mission Scene</p>
                <p className="text-lg font-black text-white mt-1">{q.scene}</p>
                <div className="mt-4">
                  <div className="flex justify-between text-xs font-bold text-slate-400 mb-2">
                    <span>Habitat Health</span>
                    <span>{habitatHealth}%</span>
                  </div>
                  <div className="h-3 rounded-full bg-slate-800 overflow-hidden border border-slate-700">
                    <div className={`h-full transition-all duration-500 ${habitatHealth >= 75 ? 'bg-green-400' : habitatHealth >= 55 ? 'bg-yellow-400' : 'bg-orange-400'}`} style={{ width: `${habitatHealth}%` }}></div>
                  </div>
                </div>
              </div>
            </div>

            <div className="flex flex-col min-h-0 gap-4">
              <div className="bg-slate-900 border border-slate-700 rounded-3xl p-4 sm:p-5">
                <div className="flex items-center justify-between gap-3 mb-3">
                  <h3 className="font-black text-white flex items-center gap-2">{q.icon} Choose your ranger action</h3>
                  <span className="text-xs font-black uppercase tracking-wider text-yellow-300">{q.tool}</span>
                </div>
                <div className="flex flex-col gap-3">
              {q.options.map((opt, idx) => (
                    <button
                      key={idx}
                      onClick={() => handleAnswer(opt, idx)}
                      disabled={!!feedback}
                      className={`p-4 sm:p-5 text-left rounded-2xl border-2 transition-all font-bold text-base sm:text-lg shadow-sm shrink-0 flex items-start gap-3
                        ${feedback && selectedOption === idx && opt.correct ? 'bg-green-950/80 border-green-400 text-green-100 shadow-[0_0_18px_rgba(74,222,128,0.25)]' : ''}
                        ${feedback && selectedOption === idx && !opt.correct ? 'bg-red-950/80 border-red-400 text-red-100 shadow-[0_0_18px_rgba(248,113,113,0.25)]' : ''}
                        ${feedback && selectedOption !== idx ? 'bg-slate-950 border-slate-800 text-slate-500' : ''}
                        ${!feedback ? 'bg-slate-800 border-slate-700 hover:border-yellow-400 hover:bg-slate-700 hover:-translate-y-1 text-slate-200 hover:shadow-[0_0_15px_rgba(250,204,21,0.2)]' : ''}`}
                    >
                      <span className={`mt-0.5 h-8 w-8 rounded-full border-2 flex items-center justify-center shrink-0 ${feedback && opt.correct ? 'border-green-300 text-green-300' : 'border-slate-600 text-slate-400'}`}>
                        {feedback && opt.correct ? <CheckCircle size={18} /> : String.fromCharCode(65 + idx)}
                      </span>
                      <span>{opt.text}</span>
                    </button>
              ))}
                </div>
              </div>

              <div className={`rounded-3xl border-2 p-5 flex-1 min-h-[170px] transition-all ${feedback ? feedback.correct ? 'bg-green-950/60 border-green-500' : 'bg-red-950/60 border-red-500' : 'bg-slate-950/80 border-slate-800'}`}>
                {feedback ? (
                  <div className="h-full flex flex-col justify-between gap-4">
                    <div>
                      <div className="flex items-center gap-3 mb-3">
                        {feedback.correct ? <CheckCircle size={34} className="text-green-300" /> : <AlertTriangle size={34} className="text-red-300" />}
                        <h3 className={`text-2xl font-black ${feedback.correct ? 'text-green-200' : 'text-red-200'}`}>
                          {feedback.correct ? 'Strong ranger choice!' : 'Good try. Ranger lesson:'}
                        </h3>
                      </div>
                      <p className="text-slate-100 leading-relaxed text-base sm:text-lg">{feedback.text}</p>
                    </div>
                    <button onClick={handleNext} className="self-start px-6 py-3 rounded-full bg-yellow-400 text-slate-900 hover:bg-yellow-300 font-black flex items-center gap-2 transition-all">
                      {currentQ < questions.length - 1 ? 'Next Mission' : 'See Results'} <ArrowRight size={18} />
                    </button>
                  </div>
                ) : (
                  <div className="h-full flex flex-col justify-center">
                    <p className="text-xs font-black uppercase tracking-wider text-slate-500 mb-2">Ranger Tip</p>
                    <p className="text-slate-300 leading-relaxed">Read the scene, choose the action that protects fireflies and their habitat, then collect your ranger tool.</p>
                  </div>
                )}
              </div>

              <div className="flex flex-wrap gap-2">
                {earnedTools.map(tool => (
                  <span key={tool} className="px-3 py-2 rounded-full bg-green-950 border border-green-700 text-green-200 text-xs font-black">
                    {tool}
                  </span>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Initialize the React application directly onto the DOM
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
